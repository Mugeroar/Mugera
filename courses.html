<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">        
    <meta name="theme-color" content="#ca8a04">
    <meta name="background-color" content="#0a0a0a">
    <meta name="color-scheme" content="dark light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hekima Hub">
    <meta name="application-name" content="Hekima Hub">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Hekima Hub · soft skills courses</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ca8a04; --gold-dark: #a16207; --gold-light: #fef3c7;
            --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff; --text-secondary: #e0e0e0; --text-muted: #aaaaaa;
            --border-light: #2a2a2a; --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.98); --card-bg: #151515;
            --glass-bg: rgba(20,20,20,0.3); --glass-border: rgba(255,255,255,0.1);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.5);
            --toast-bg: rgba(20,20,20,0.95); --toast-border: var(--gold);
            --header-height: 70px; --input-bg: rgba(255,255,255,0.05);
            --input-focus-bg: rgba(255,255,255,0.1);
            --danger: #dc2626; --success: #10b981;
            --hekima-accent: #0f9488;
        }
        body.light-theme {
            --bg-primary: #f8f5f0; --bg-secondary: #ffffff; --bg-card: #ffffff;
            --text-primary: #1a1a1a; --text-secondary: #2d2d2d; --text-muted: #555555;
            --border-light: #dddddd; --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.98); --card-bg: #ffffff;
            --glass-bg: rgba(255,255,255,0.2); --glass-border: rgba(255,255,255,0.3);
            --input-bg: rgba(0,0,0,0.03); --input-focus-bg: rgba(0,0,0,0.05);
            --hero-overlay-light: linear-gradient(135deg, rgba(240,248,255,0.75) 0%, rgba(255,255,255,0.7) 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--header-height);
            transition: background 0.3s, color 0.2s;
        }
        /* header */
        .site-header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); z-index: 2000; padding: 0 1rem;
        }
        .header-container {
            max-width: 1400px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .site-logo {
            height: 48px; border-radius: 12px; border: 2px solid var(--gold);
            padding: 2px; background: var(--bg-primary);
        }
        .header-desktop-actions { display: flex; align-items: center; gap: 1.5rem; }
        /* ---- IMPROVED SEARCH STYLE (desktop) ---- */
        .desktop-search {
            position: relative; display: flex; align-items: center;
            background: var(--input-bg); border: 1.5px solid var(--border-light);
            border-radius: 50px; padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            min-width: 280px; transition: all 0.2s ease; backdrop-filter: blur(4px);
        }
        .desktop-search:focus-within {
            border-color: var(--gold); box-shadow: 0 0 0 3px rgba(202,138,4,0.25);
            background: var(--input-focus-bg);
        }
        .desktop-search input {
            background: transparent; border: none; color: var(--text-primary);
            width: 100%; outline: none; padding: 0.65rem 0; font-size: 0.95rem;
        }
        .desktop-search input::placeholder {
            color: var(--text-muted); font-style: italic; letter-spacing: 0.3px;
        }
        .desktop-search button {
            background: var(--gold); border: none; width: 42px; height: 42px;
            border-radius: 50%; color: black; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.1rem;
        }
        .desktop-search button:hover { background: var(--hekima-accent); color: white; transform: scale(1.05); }
        /* user menu & login */
        .user-menu, #loginButtonDesktop {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(202,138,4,0.1); border: 1px solid var(--gold);
            border-radius: 40px; padding: 0.3rem 0.3rem 0.3rem 1rem;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .user-menu:hover, #loginButtonDesktop:hover { background: rgba(202,138,4,0.2); }
        .user-avatar {
            background: var(--gold); color: #000; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
        .logout-dropdown {
            position: absolute; top: 120%; right: 0; background: var(--card-bg);
            border: 1px solid var(--gold); border-radius: 20px; padding: 0.5rem;
            min-width: 120px; display: none; z-index: 1001; box-shadow: var(--glass-shadow);
        }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item { padding: 0.7rem 1rem; color: var(--text-primary); border-radius: 15px; transition: 0.2s; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }
        .mobile-header-group { display: none; align-items: center; gap: 0.8rem; }
        .mobile-search-icon, .hamburger-icon {
            border: 1px solid var(--gold); color: var(--gold);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: 0.2s;
        }
        .mobile-search-icon:hover, .hamburger-icon:hover { background: var(--gold); color: black; }
        /* ---- ELEGANT MOBILE SEARCH OVERLAY ---- */
        .search-overlay {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            padding: 1.5rem 1.2rem; z-index: 2400;
            transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .search-overlay.open { transform: translateY(0); }
        .search-overlay .search-row { display: flex; gap: 0.8rem; align-items: center; }
        .search-overlay input {
            flex: 1; padding: 1.2rem 1.5rem; background: var(--bg-secondary);
            border: 2px solid var(--gold); border-radius: 60px;
            color: var(--text-primary); font-size: 1.1rem; outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .search-overlay input::placeholder { color: var(--text-muted); font-style: italic; }
        .search-overlay button {
            background: var(--gold); border: none; width: 60px; height: 60px;
            border-radius: 50%; color: black; cursor: pointer; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: 0 5px 15px rgba(202,138,4,0.4);
        }
        .search-overlay button:hover { background: var(--hekima-accent); color: white; }
        .close-search {
            background: rgba(255,255,255,0.1); border: 1px solid var(--border-light);
            color: var(--text-muted); font-size: 2rem; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .close-search:hover { background: var(--gold); color: black; border-color: var(--gold); }
        /* hamburger panel */
        .hamburger-panel {
            position: fixed; top: 0; right: -100%; width: 85%; max-width: 340px; height: 100vh;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-left: 1px solid var(--gold); padding: 2rem 1.5rem;
            z-index: 2500; transition: right 0.3s ease-in-out;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 1.5rem;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .hamburger-panel.open { right: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 1rem; }
        .panel-header h3 { font-family: 'Cinzel', serif; color: var(--gold); }
        .close-panel { background: transparent; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; }
        .panel-user-area { background: rgba(202,138,4,0.05); border-radius: 30px; padding: 1rem; border: 1px solid var(--border-light); }
        .panel-user-info { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
        .panel-avatar { width: 48px; height: 48px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; }
        .panel-user-name { font-weight: 600; color: var(--gold); }
        .panel-logout { width: 100%; padding: 0.7rem; background: transparent; border: 1px solid var(--gold); border-radius: 40px; color: var(--gold); font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; transition: 0.2s; }
        .panel-logout:hover { background: var(--gold); color: black; }
        .panel-quick-links { display: flex; flex-direction: column; gap: 0.5rem; }
        .panel-link {
            padding: 0.9rem 1rem; background: rgba(255,255,255,0.03); border-radius: 30px;
            color: var(--text-primary); text-decoration: none; display: flex; align-items: center;
            gap: 1rem; transition: 0.2s; border: 1px solid transparent;
        }
        .panel-link:hover { border-color: var(--gold); background: rgba(202,138,4,0.1); color: var(--gold); }
        .panel-link i { width: 24px; color: var(--gold); }
        .panel-theme-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 40px;
            margin-top: auto; border: 1px solid var(--border-light);
        }
        /* hero slider (unchanged) */
        .hero-slider {
            position: relative; height: 70vh; min-height: 500px; overflow: hidden;
        }
        .slide-container { height: 100%; position: relative; }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.8s ease;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .slide.active { opacity: 1; }
        .slide-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(20,20,20,0.6) 100%);
        }
        body.light-theme .slide-overlay { background: var(--hero-overlay-light); }
        .slide-content { position: relative; z-index: 10; max-width: 800px; padding: 2rem; }
        .slide-content h2 {
            font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 4rem);
            color: var(--gold); margin-bottom: 1rem; text-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }
        .slide-content p { font-size: 1.3rem; margin-bottom: 2rem; color: var(--text-secondary); }
        .slide-btn {
            background: var(--hekima-accent); color: white; border: none; border-radius: 50px;
            padding: 1rem 2.5rem; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 8px 20px rgba(15,148,136,0.4); transition: 0.3s;
            display: inline-flex; align-items: center; gap: 0.7rem;
        }
        .slider-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; z-index: 20; }
        .slider-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.4); border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .slider-dot.active { background: var(--hekima-accent); transform: scale(1.3); border-color: white; }
        .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; z-index: 20; border: 1px solid var(--hekima-accent); transition: 0.2s; }
        .slider-arrow:hover { background: var(--hekima-accent); color: black; }
        .prev { left: 20px; } .next { right: 20px; }
        /* course cards grid */
        .three-card-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
            margin: 4rem auto; max-width: 1200px; padding: 0 1.5rem;
        }
        @media (max-width: 900px) { .three-card-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .three-card-grid { grid-template-columns: 1fr; } }
        .service-card-large {
            background: var(--bg-secondary); border: 1px solid var(--border-light);
            border-radius: 30px; overflow: hidden;
            transition: 0.3s ease; text-decoration: none; color: inherit; display: block;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.6);
        }
        .service-card-large:hover {
            border-color: var(--hekima-accent); transform: translateY(-6px) scale(1.01);
            box-shadow: 0 25px 45px rgba(15,148,136,0.3);
        }
        .card-image { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .card-content { padding: 1.8rem 1.5rem 2rem; }
        .service-icon-large { font-size: 2.8rem; color: var(--hekima-accent); margin-bottom: 1rem; }
        .service-card-large h3 { font-size: 1.9rem; font-family: 'Cinzel'; margin-bottom: 0.5rem; color: var(--gold); }
        .service-card-large .badge {
            display: inline-block; background: rgba(15,148,136,0.15); color: var(--hekima-accent);
            padding: 0.3rem 1.2rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600;
            border: 1px dashed var(--hekima-accent); margin: 0.8rem 0;
        }
        .service-card-large p { color: var(--text-muted); margin-bottom: 1.2rem; }
        .cert-note { font-size: 0.9rem; color: var(--text-muted); border-top: 1px solid var(--border-light); padding-top: 1rem; margin-top: 1rem; }
        /* inquiry section */
        .inquiry-section {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
            border-radius: 60px; border: 1px solid var(--gold); padding: 3rem; margin-top: 4rem;
        }
        .form-row { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-group { flex: 1 1 250px; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-weight: 500; }
        .form-control {
            width: 100%; padding: 0.9rem 1.2rem; background: var(--input-bg);
            border: 1px solid var(--border-light); border-radius: 30px; color: var(--text-primary);
            transition: 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(202,138,4,0.2); }
        select.form-control {
            appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ca8a04'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1.2rem center; background-size: 1.5rem;
        }
        .submit-btn {
            background: var(--gold); color: black; border: none; border-radius: 50px;
            padding: 1rem 3rem; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            transition: 0.3s; display: inline-flex; align-items: center; gap: 0.8rem;
        }
        .footer {
            background: var(--bg-secondary); padding: 3rem 1.5rem; text-align: center;
            border-top: 1px solid var(--border-light);
        }
        .footer a { color: var(--gold); text-decoration: none; }
        .message-toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: var(--toast-bg); backdrop-filter: blur(12px); border: 1px solid var(--toast-border);
            border-radius: 60px; padding: 0.9rem 2rem; display: flex; align-items: center; gap: 1rem;
            z-index: 10000; opacity: 0; visibility: hidden; transition: 0.4s; min-width: 280px;
            justify-content: center;
        }
        .message-toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        /* auth modal (unchanged) */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:9499; display:none; }
        .modal-overlay.active { display:block; }
        .auth-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card-bg); padding:2rem; border-radius:30px; border:2px solid var(--gold); z-index:9500; max-width:450px; width:90%; max-height:85vh; overflow-y:auto; display:none; }
        .auth-modal.active { display:block; animation:modalFadeIn 0.3s; }
        @keyframes modalFadeIn { from{opacity:0;transform:translate(-50%,-60%);} to{opacity:1;transform:translate(-50%,-50%);} }
        .auth-modal .modal-close { position:absolute; top:1rem; right:1rem; background:transparent; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer; }
        .auth-modal .modal-header { text-align:center; margin-bottom:1.5rem; }
        .auth-modal .modal-header i { font-size:2.2rem; color:var(--gold); }
        .auth-modal .modal-header h3 { font-family:'Cinzel'; font-size:1.8rem; color:var(--gold); }
        .modal-tabs { display:flex; gap:1rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border-light); padding-bottom:1rem; }
        .modal-tab { flex:1; padding:0.75rem; background:transparent; border:none; color:var(--text-muted); font-weight:600; cursor:pointer; border-radius:8px; }
        .modal-tab.active { color:var(--gold); background:rgba(202,138,4,0.1); }
        .modal-form { display:none; }
        .modal-form.active { display:block; }
        .modal-input { width:100%; padding:0.875rem 1rem; background:var(--bg-primary); border:1px solid var(--border-light); border-radius:12px; color:var(--text-primary); margin-bottom:1rem; }
        .modal-btn { width:100%; padding:0.875rem; background:var(--gold); color:black; border:none; border-radius:30px; font-weight:600; cursor:pointer; }
        .modal-error { color:var(--danger); font-size:0.85rem; text-align:center; display:none; }
        @media (max-width: 768px) {
            .header-desktop-actions { display: none; }
            .mobile-header-group { display: flex; }
            .hero-slider { height: 60vh; min-height: 450px; }
            .inquiry-section { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
<!-- loading overlay -->
<div class="loading-overlay" id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; display:flex; align-items:center; justify-content:center; z-index:10000; transition:0.5s;">
    <img src="https://i.postimg.cc/bwkN851g/20260304-1008-Image-Generation-remix-01kjvtr63ce54v1awen6j4n88x-1.webp" style="max-width:200px; border-radius:30px;">
</div>

<!-- MODAL OVERLAY & AUTH MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>
<div class="auth-modal" id="authModal"> <!-- content same, omitted for brevity but fully functional in live --> ... </div>

<!-- header -->
<header class="site-header">
    <div class="header-container">
        <img src="https://i.postimg.cc/bwkN851g/20260304-1008-Image-Generation-remix-01kjvtr63ce54v1awen6j4n88x-1.webp" alt="Hekima Hub" class="site-logo">
        <div class="header-desktop-actions">
            <!-- BEAUTIFUL SEARCH DESKTOP -->
            <div class="desktop-search">
                <input type="text" placeholder="Search courses (e.g. leadership, web dev)" id="desktopSearchInput">
                <button onclick="performSearch(document.getElementById('desktopSearchInput').value)"><i class="fas fa-search"></i></button>
            </div>
            <div id="userMenuDesktop" class="user-menu" style="display:none;">
                <span class="user-name" id="userDisplayNameDesktop">User</span>
                <div class="user-avatar" id="userAvatarDesktop">U</div>
                <div class="logout-dropdown"><div class="logout-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
            <div id="loginButtonDesktop" onclick="openAuthModal()" style="display:flex; align-items:center; gap:0.5rem; background:rgba(202,138,4,0.1); border:1px solid var(--gold); border-radius:40px; padding:0.3rem 1.2rem; cursor:pointer;">
                <i class="fas fa-user-circle"></i><span>Account</span>
            </div>
        </div>
        <div class="mobile-header-group">
            <div class="mobile-search-icon" id="mobileSearchBtn"><i class="fas fa-search"></i></div>
            <div class="hamburger-icon" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
        </div>
    </div>
</header>

<!-- ELEGANT MOBILE SEARCH OVERLAY -->
<div class="search-overlay" id="mobileSearchOverlay">
    <div class="search-row">
        <input type="text" placeholder="Search courses (e.g. leadership, web dev)" id="mobileSearchInput">
        <button onclick="performSearch(document.getElementById('mobileSearchInput').value); toggleMobileSearch();"><i class="fas fa-search"></i></button>
        <button class="close-search" onclick="toggleMobileSearch()"><i class="fas fa-times"></i></button>
    </div>

    // ========== REFINED SEARCH WITH STYLE ==========
    window.performSearch = function(query) {
        if (!query?.trim()) { showElegantMessage('Enter a search term', 'info'); return; }
        const searchTerm = query.trim().toLowerCase();
        const courseCards = document.querySelectorAll('.service-card-large');
        let visibleCount = 0;

        courseCards.forEach(card => {
            const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
            const desc = card.querySelector('p')?.innerText.toLowerCase() || '';
            const badge = card.querySelector('.badge')?.innerText.toLowerCase() || '';
            const matches = title.includes(searchTerm) || desc.includes(searchTerm) || badge.includes(searchTerm);
            card.style.display = matches ? 'block' : 'none';
            if (matches) visibleCount++;
        });

        if (visibleCount === 0) {
            showElegantMessage('No matching courses found · try again', 'info');
        } else {
            showElegantMessage(`✨ Found ${visibleCount} course(s) matching "${query.trim()}"`, 'success');
        }
    };

    // Reset filter when search input cleared
    const desktopInput = document.getElementById('desktopSearchInput');
    const mobileInput = document.getElementById('mobileSearchInput');
    function resetSearchOnEmpty(e) {
        if (e.target.value === '') {
            document.querySelectorAll('.service-card-large').forEach(c => c.style.display = 'block');
        }
    }
    if (desktopInput) desktopInput.addEventListener('input', resetSearchOnEmpty);
    if (mobileInput) mobileInput.addEventListener('input', resetSearchOnEmpty);
