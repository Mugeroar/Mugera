<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ca8a04">
    <meta name="background-color" content="#0a0a0a">
    <meta name="color-scheme" content="dark light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkFit Club">
    <meta name="application-name" content="WorkFit Club">
    <title>WorkFit · Member Dashboard</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ca8a04; --gold-dark: #a16207; --gold-light: #fef3c7;
            --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff; --text-secondary: #e0e0e0; --text-muted: #aaaaaa;
            --border-light: #2a2a2a; --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.95); --card-bg: #151515;
            --input-bg: rgba(255,255,255,0.05); --input-focus-bg: rgba(255,255,255,0.1);
            --danger: #dc2626; --success: #10b981;
        }
        body.light-theme {
            --bg-primary: #f8f5f0; --bg-secondary: #ffffff; --bg-card: #ffffff;
            --text-primary: #1a1a1a; --text-secondary: #2d2d2d; --text-muted: #555555;
            --border-light: #dddddd; --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.95); --card-bg: #ffffff;
            --input-bg: rgba(0,0,0,0.03); --input-focus-bg: rgba(0,0,0,0.05);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: 70px;
            transition: background 0.3s, color 0.2s;
        }
        /* header (minimal, reused from main) */
        .site-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); z-index: 2000; padding: 0 1rem;
        }
        .header-container {
            max-width: 1400px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .site-logo { height: 48px; border-radius: 12px; border: 2px solid var(--gold); padding: 2px; background: var(--bg-primary); }
        .header-desktop-actions { display: flex; align-items: center; gap: 1.5rem; }
        .user-menu, #loginButtonDesktop {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(202,138,4,0.1); border: 1px solid var(--gold);
            border-radius: 40px; padding: 0.3rem 0.3rem 0.3rem 1rem;
            cursor: pointer; position: relative;
        }
        .user-avatar { background: var(--gold); color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logout-dropdown { position: absolute; top: 120%; right: 0; background: var(--card-bg); border: 1px solid var(--gold); border-radius: 20px; padding: 0.5rem; min-width: 120px; display: none; z-index: 1001; }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item { padding: 0.7rem 1rem; color: var(--text-primary); border-radius: 15px; transition: 0.2s; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }
        .mobile-header-group { display: none; align-items: center; gap: 0.8rem; }
        .hamburger-icon { border: 1px solid var(--gold); color: var(--gold); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; }

        /* dashboard container */
        .dashboard {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        /* hero stats */
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 1.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-4px); }
        .stat-icon {
            width: 60px; height: 60px;
            background: rgba(202,138,4,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--gold);
        }
        .stat-content h3 { font-size: 2rem; font-weight: 800; line-height: 1.2; }
        .stat-content p { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* section titles */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        /* booking row */
        .booking-panel {
            background: var(--bg-secondary);
            border-radius: 60px;
            border: 1px solid var(--gold);
            padding: 2rem;
            margin-bottom: 3rem;
        }
        .booking-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: flex-end;
        }
        .form-group {
            flex: 1 1 180px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .book-btn {
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 50px;
            padding: 0.9rem 2.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: 0.2s;
            font-size: 1rem;
        }
        .book-btn:hover { background: #b8860b; transform: scale(1.02); }

        /* upcoming schedule grid */
        .schedule-grid, .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .session-card {
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--border-light);
            padding: 1.5rem;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .session-card:hover { border-color: var(--gold); transform: translateY(-4px); }
        .session-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px dashed var(--border-light);
            padding-bottom: 0.8rem;
        }
        .session-icon {
            background: rgba(202,138,4,0.1);
            width: 45px; height: 45px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--gold);
        }
        .session-title {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .session-detail {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .session-detail i {
            width: 20px;
            color: var(--gold);
        }
        .status-badge {
            align-self: flex-start;
            background: rgba(16,185,129,0.15);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .history-badge {
            background: rgba(220,38,38,0.1);
            border-color: var(--danger);
            color: var(--text-muted);
        }
        /* message toast */
        .toast-dash {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--gold); border-radius: 60px;
            padding: 0.9rem 2rem; display: flex; align-items: center; gap: 1rem;
            z-index: 10000; opacity: 0; visibility: hidden; transition: 0.4s;
        }
        .toast-dash.show { opacity: 1; visibility: visible; }

        @media (max-width:768px) {
            .header-desktop-actions { display:none; }
            .mobile-header-group { display:flex; }
            .booking-form { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <img src="https://i.postimg.cc/bwkN851g/20260304_1008_Image_Generation_remix_01kjvtr63ce54v1awen6j4n88x-1.webp" alt="WorkFit" class="site-logo">
            <div class="header-desktop-actions">
                <div id="userMenuDesktop" class="user-menu" style="display:none;">
                    <span class="user-name" id="userDisplayNameDesktop">User</span>
                    <div class="user-avatar" id="userAvatarDesktop">U</div>
                    <div class="logout-dropdown"><div class="logout-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                </div>
                <div id="loginButtonDesktop" onclick="openAuthModal()" style="display:flex; align-items:center; gap:0.5rem; background:rgba(202,138,4,0.1); border:1px solid var(--gold); border-radius:40px; padding:0.3rem 1.2rem; cursor:pointer;">
                    <i class="fas fa-user-circle"></i><span>Account</span>
                </div>
            </div>
            <div class="mobile-header-group">
                <div class="hamburger-icon" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </header>

    <!-- Dashboard Main -->
    <div class="dashboard" id="dashboardMain">
        <!-- Hero Stats -->
        <div class="hero-stats" id="statsContainer">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-content"><h3 id="statBookings">0</h3><p>total bookings</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-content"><h3 id="statUpcoming">0</h3><p>upcoming</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-history"></i></div><div class="stat-content"><h3 id="statPast">0</h3><p>past sessions</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-crown"></i></div><div class="stat-content"><h3 id="statPlan">-</h3><p>current plan</p></div></div>
        </div>

        <!-- Booking Section -->
        <div class="booking-panel">
            <h2 class="section-title"><i class="fas fa-pen-alt"></i> Book a session</h2>
            <div class="booking-form" id="bookingForm">
                <div class="form-group">
                    <label><i class="fas fa-dumbbell"></i> Session type</label>
                    <select id="sessionType">
                        <option value="Fit-Solo">Fit-Solo (guided)</option>
                        <option value="Fit Fam">Fit Fam (family)</option>
                        <option value="FIT-FURNACE (Uthiru)">FIT-FURNACE Uthiru</option>
                        <option value="FIT-FURNACE (Lavington)">FIT-FURNACE Lavington</option>
                        <option value="Sporting">Sporting (coaching)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> Date</label>
                    <input type="date" id="bookingDate" value="">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Time</label>
                    <select id="bookingTime">
                        <option value="07:00">7:00 AM</option>
                        <option value="09:00">9:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="15:00">3:00 PM</option>
                        <option value="17:00">5:00 PM</option>
                        <option value="18:30">6:30 PM</option>
                    </select>
                </div>
                <button class="book-btn" id="bookSessionBtn"><i class="fas fa-check-circle"></i> Book now</button>
            </div>
        </div>

        <!-- Upcoming schedule -->
        <h2 class="section-title"><i class="fas fa-calendar-alt"></i> Your schedule</h2>
        <div id="upcomingContainer" class="schedule-grid"><p style="color:var(--text-muted);">Loading schedule...</p></div>

        <!-- History -->
        <h2 class="section-title"><i class="fas fa-history"></i> Activity history</h2>
        <div id="historyContainer" class="history-grid"><p style="color:var(--text-muted);">Loading history...</p></div>
    </div>

    <!-- Simple auth modal (placeholder) -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9499;"></div>
    <div class="auth-modal" id="authModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card-bg); padding:2rem; border-radius:30px; border:2px solid var(--gold); z-index:9500; max-width:400px; width:90%;">
        <button onclick="closeModal()" style="float:right; background:none; border:none; color:var(--text-muted); font-size:1.5rem;">&times;</button>
        <h3 style="color:var(--gold); margin-bottom:1rem;">Login / Signup</h3>
        <p style="color:var(--text-muted); margin-bottom:1rem;">Use main page for full auth. For demo, enter any email:</p>
        <input type="email" id="dummyEmail" placeholder="email" class="form-group" style="width:100%; margin-bottom:1rem; padding:0.8rem;">
        <button onclick="fakeLogin()" class="book-btn" style="width:100%;">Continue as guest</button>
    </div>

    <div id="dashToast" class="toast-dash"><i class="fas fa-info-circle"></i><span id="toastMsg">Message</span></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;
        let userBookings = []; // all bookings from RTDB
        let userSubscription = null;

        // DOM elements
        const statBookings = document.getElementById('statBookings');
        const statUpcoming = document.getElementById('statUpcoming');
        const statPast = document.getElementById('statPast');
        const statPlan = document.getElementById('statPlan');
        const upcomingDiv = document.getElementById('upcomingContainer');
        const historyDiv = document.getElementById('historyContainer');
        const bookBtn = document.getElementById('bookSessionBtn');
        const sessionType = document.getElementById('sessionType');
        const bookingDate = document.getElementById('bookingDate');
        const bookingTime = document.getElementById('bookingTime');

        // Set default date to today
        const today = new Date().toISOString().split('T')[0];
        bookingDate.value = today;

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            updateUIForUser(user);
            if (user) {
                await Promise.all([loadSubscription(user.uid), loadBookings(user.uid)]);
            } else {
                // guest view: show demo placeholders
                document.getElementById('statsContainer').innerHTML = `<div class="stat-card" style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-lock" style="font-size:3rem; color:var(--gold);"></i><h3 style="margin:1rem 0;">Please log in to view dashboard</h3><button onclick="openAuthModal()" class="book-btn" style="margin:0 auto;">Login / Sign up</button></div>`;
                upcomingDiv.innerHTML = ''; historyDiv.innerHTML = '';
            }
        });

        async function loadSubscription(uid) {
            const snap = await database.ref('package_signups').orderByChild('uid').equalTo(uid).once('value');
            const subs = [];
            snap.forEach(child => subs.push({ id: child.key, ...child.val() }));
            subs.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
            userSubscription = subs[0] || null;
            if (userSubscription) {
                statPlan.innerText = userSubscription.package.substring(0,12) + '…';
            } else {
                statPlan.innerText = 'No plan';
            }
        }

        async function loadBookings(uid) {
            const snap = await database.ref('workfit_bookings').orderByChild('uid').equalTo(uid).once('value');
            userBookings = [];
            snap.forEach(child => userBookings.push({ id: child.key, ...child.val() }));
            // sort by date descending (latest first)
            userBookings.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            renderStatsAndLists();
        }

        function renderStatsAndLists() {
            const now = Date.now();
            const upcoming = userBookings.filter(b => b.timestamp > now);
            const past = userBookings.filter(b => b.timestamp <= now);
            statBookings.innerText = userBookings.length;
            statUpcoming.innerText = upcoming.length;
            statPast.innerText = past.length;

            // Render upcoming (next 3, sorted ascending)
            const upcomingSorted = [...upcoming].sort((a,b) => a.timestamp - b.timestamp);
            upcomingDiv.innerHTML = '';
            if (upcomingSorted.length === 0) upcomingDiv.innerHTML = '<p style="color:var(--text-muted);">No upcoming sessions. Book one above!</p>';
            else {
                upcomingSorted.slice(0,5).forEach(b => renderSessionCard(b, 'upcoming'));
            }

            // Render history (last 5)
            const pastSorted = [...past].sort((a,b) => b.timestamp - a.timestamp);
            historyDiv.innerHTML = '';
            if (pastSorted.length === 0) historyDiv.innerHTML = '<p style="color:var(--text-muted);">No past activity yet.</p>';
            else {
                pastSorted.slice(0,5).forEach(b => renderSessionCard(b, 'past'));
            }
        }

        function renderSessionCard(booking, type) {
            const dateStr = new Date(booking.timestamp).toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
            const container = type === 'upcoming' ? upcomingDiv : historyDiv;
            const card = document.createElement('div');
            card.className = 'session-card';
            card.innerHTML = `
                <div class="session-header">
                    <div class="session-icon"><i class="fas ${booking.icon || 'fa-dumbbell'}"></i></div>
                    <div class="session-title">${booking.sessionType || 'WorkFit'}</div>
                </div>
                <div class="session-detail"><i class="fas fa-calendar"></i> ${dateStr}</div>
                <div class="session-detail"><i class="fas fa-map-pin"></i> ${booking.location || 'Main gym'}</div>
                <span class="status-badge ${type === 'past' ? 'history-badge' : ''}">${type === 'upcoming' ? 'confirmed' : 'completed'}</span>
            `;
            container.appendChild(card);
        }

        // BOOKING handler
        bookBtn.addEventListener('click', async () => {
            if (!currentUser) {
                showToast('Please login first', 'info');
                openAuthModal();
                return;
            }
            const type = sessionType.value;
            const date = bookingDate.value;
            const time = bookingTime.value;
            if (!date) { showToast('Select a date', 'warn'); return; }
            // combine date + time into timestamp
            const dateTimeStr = `${date}T${time}:00`;
            const timestamp = new Date(dateTimeStr).getTime();
            if (timestamp < Date.now()) {
                showToast('Cannot book in the past', 'warn');
                return;
            }

            // extract location if any
            let location = 'Uthiru/Lavington';
            if (type.includes('Uthiru')) location = 'Uthiru';
            else if (type.includes('Lavington')) location = 'Lavington';

            try {
                const newBookingRef = database.ref('workfit_bookings').push();
                await newBookingRef.set({
                    uid: currentUser.uid,
                    sessionType: type,
                    bookingDate: date,
                    bookingTime: time,
                    timestamp: timestamp,
                    location: location,
                    createdAt: Date.now(),
                    status: 'upcoming'
                });
                showToast('Session booked successfully!', 'success');
                // reload bookings
                await loadBookings(currentUser.uid);
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        });

        // helper
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('dashToast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Auth UI (mirror)
        function updateUIForUser(user) {
            const desktopMenu = document.getElementById('userMenuDesktop');
            const desktopLogin = document.getElementById('loginButtonDesktop');
            const userNameSpan = document.getElementById('userDisplayNameDesktop');
            const userAvatar = document.getElementById('userAvatarDesktop');
            if (user) {
                let dn = user.displayName || user.email?.split('@')[0] || 'Mugera';
                dn = dn.charAt(0).toUpperCase() + dn.slice(1);
                if (userNameSpan) userNameSpan.textContent = dn;
                if (userAvatar) userAvatar.textContent = dn.charAt(0).toUpperCase();
                if (desktopMenu) desktopMenu.style.display = 'flex';
                if (desktopLogin) desktopLogin.style.display = 'none';
            } else {
                if (desktopMenu) desktopMenu.style.display = 'none';
                if (desktopLogin) desktopLogin.style.display = 'flex';
            }
        }

        window.handleLogout = async () => {
            try { await auth.signOut(); window.location.reload(); } catch (err) { showToast(err.message); }
        };

        // modals (stub)
        window.openAuthModal = function() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('authModal').style.display = 'block';
        };
        window.closeModal = function() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('authModal').style.display = 'none';
        };
        window.fakeLogin = function() {
            const email = document.getElementById('dummyEmail').value || 'demo@workfit.com';
            // sign in anonymously? For demo, just set currentUser-like
            auth.signInAnonymously().catch(() => {
                // fallback: fake user
                currentUser = { uid: 'fake'+Date.now(), email: email };
                updateUIForUser(currentUser);
                closeModal();
                loadBookings(currentUser.uid);
                loadSubscription(currentUser.uid);
            });
        };
        // hamburger
        document.getElementById('hamburgerBtn')?.addEventListener('click', ()=>{
            alert('Navigation panel would open (same as main site)');
        });

        // initial
        if (!auth.currentUser) {
            // show guest stats but login required message already via onAuthStateChanged
        }
    </script>
