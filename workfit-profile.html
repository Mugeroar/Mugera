<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>I AM MUGERA · my profile</title>
    <!-- fonts & icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Cinzel:wght@400..700&display=swap" rel="stylesheet">
    <!-- firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --gold: #ca8a04; --gold-dark:#a16207; --gold-light:#fef3c7;
            --bg:#0a0a0a; --bg-card:#151515; --text:#fff; --text-muted:#aaa;
            --border:#2a2a2a; --shadow:rgba(202,138,4,0.2);
            --danger:#dc2626; --success:#10b981; --info:#3b82f6;
        }
        body.light {
            --bg:#f8f5f0; --bg-card:#ffffff; --text:#1a1a1a; --text-muted:#555;
            --border:#ddd; --shadow:rgba(202,138,4,0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            padding: 2rem 1.5rem;
            transition: background 0.2s;
        }
        .dashboard {
            max-width: 1400px; margin: 0 auto;
        }
        /* header with theme toggle */
        .profile-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1.5rem;
            margin-bottom: 2.5rem;
            background: var(--bg-card); border-radius: 40px;
            padding: 1.5rem 2rem; border: 1px solid var(--gold);
        }
        .user-badge {
            display: flex; align-items: center; gap: 1.5rem;
        }
        .avatar {
            width: 80px; height: 80px;
            background: var(--gold); color: #000;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700;
            border: 3px solid var(--gold-light);
        }
        .user-info h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem; color: var(--gold);
        }
        .user-info .email {
            color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;
            margin-top: 0.2rem;
        }
        .theme-toggle {
            background: rgba(202,138,4,0.1);
            border: 1px solid var(--gold); border-radius: 60px;
            padding: 0.5rem 1.2rem; display: flex; align-items: center; gap: 0.7rem;
            cursor: pointer;
        }
        .theme-toggle i { color: var(--gold); font-size: 1.2rem; }
        /* stat cards */
        .stat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr));
            gap: 1.5rem; margin-bottom: 2.5rem;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 30px; padding: 1.5rem 1rem;
            display: flex; align-items: center; gap: 1rem;
            transition: 0.2s; box-shadow: 0 10px 20px -10px var(--shadow);
        }
        .stat-card:hover { border-color: var(--gold); }
        .stat-icon {
            width: 50px; height: 50px;
            background: rgba(202,138,4,0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: var(--gold);
        }
        .stat-content h3 { font-size: 1.8rem; font-weight: 700; line-height: 1.2; }
        .stat-content p { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        /* section titles */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem; color: var(--gold);
            margin: 2rem 0 1.5rem; display: flex; align-items: center; gap: 1rem;
        }
        .section-title i { font-size: 1.8rem; }
        /* cards grid */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem; margin-bottom: 1.5rem;
        }
        .item-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 30px; padding: 1.5rem;
            transition: 0.2s;
        }
        .item-card:hover { border-color: var(--gold); }
        .card-badge {
            display: inline-block; padding: 0.2rem 1rem;
            border-radius: 30px; font-size: 0.75rem; font-weight: 600;
            background: rgba(202,138,4,0.1); border: 1px solid var(--gold);
            margin-bottom: 1rem;
        }
        .card-title {
            font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .card-title i { color: var(--gold); width: 1.5rem; }
        .card-meta {
            color: var(--text-muted); font-size: 0.9rem;
            display: flex; flex-wrap: wrap; gap: 1rem;
            margin: 1rem 0;
        }
        .card-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .status-badge {
            font-size: 0.75rem; padding: 0.15rem 1rem; border-radius: 30px;
            font-weight: 600; display: inline-block;
        }
        .status-active { background: rgba(16,185,129,0.15); color: var(--success); border:1px solid var(--success); }
        .status-pending { background: rgba(202,138,4,0.15); color: var(--gold); border:1px solid var(--gold); }
        .status-cancelled, .status-expired { background: rgba(220,38,38,0.1); color: var(--danger); border:1px solid var(--danger); }
        .pill-info { background: rgba(59,130,246,0.1); color: var(--info); border:1px solid var(--info); }
        /* order items */
        .order-items { margin: 1rem 0; padding-left: 0.5rem; }
        .order-item { font-size: 0.9rem; border-bottom: 1px dashed var(--border); padding: 0.3rem 0; }
        /* loading */
        .loading-spinner {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid rgba(202,138,4,0.2); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 1s infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); border: 1px solid var(--gold);
            border-radius: 60px; padding: 0.8rem 2rem;
            display: flex; align-items: center; gap: 1rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 9999;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .toast.show { opacity: 1; visibility: visible; }
        @media (max-width:600px) {
            .profile-header { flex-direction: column; align-items: start; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboardMain">
    <!-- profile header -->
    <div class="profile-header">
        <div class="user-badge">
            <div class="avatar" id="avatar">M</div>
            <div class="user-info">
                <h1 id="displayName">Mugera</h1>
                <div class="email"><i class="fas fa-envelope"></i> <span id="userEmail">loading...</span></div>
                <div style="margin-top:0.5rem;"><span class="status-badge status-active" id="membershipBadge">member</span></div>
            </div>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-palette"></i>
            <span>light/dark</span>
            <i class="fas fa-moon" id="themeIcon"></i>
        </div>
    </div>

    <!-- stats row (dynamic) -->
    <div class="stat-grid" id="statsContainer"></div>

    <!-- ===== MAIN ACTIVITY SECTIONS ===== -->
    <!-- 1. Memberships & Subscriptions -->
    <div class="section-title"><i class="fas fa-crown"></i> My Memberships & subscriptions</div>
    <div class="cards-grid" id="membershipsGrid"></div>

    <!-- 2. Package signups / WorkFit specific -->
    <div class="section-title"><i class="fas fa-dumbbell"></i> WorkFit packages</div>
    <div class="cards-grid" id="packagesGrid"></div>

    <!-- 3. Store Orders -->
    <div class="section-title"><i class="fas fa-shopping-bag"></i> Order history</div>
    <div class="cards-grid" id="ordersGrid"></div>

    <!-- 4. Community & Impact -->
    <div class="section-title"><i class="fas fa-users"></i> Community & activities</div>
    <div class="cards-grid" id="communityGrid"></div>

    <!-- 5. Inquiries & waitlists -->
    <div class="section-title"><i class="fas fa-envelope-open-text"></i> Inquiries & waitlist</div>
    <div class="cards-grid" id="inquiriesGrid"></div>

    <!-- 6. Partnerships & Submissions -->
    <div class="section-title"><i class="fas fa-handshake"></i> Partnerships & contributions</div>
    <div class="cards-grid" id="partnershipGrid"></div>
</div>

<!-- toast -->
<div id="globalToast" class="toast"><i class="fas fa-bell"></i> <span id="toastMsg">message</span></div>

<script>
    // Firebase config (same as export)
    const firebaseConfig = {
        apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
        authDomain: "mugera-e51cc.firebaseapp.com",
        databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mugera-e51cc",
        storageBucket: "mugera-e51cc.firebasestorage.app",
        messagingSenderId: "1024868637509",
        appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let userEmail = '';
    let userId = '';

    // Store all fetched data
    let dbData = {
        subscriptions: [],       // from /subscriptions
        package_signups: [],     // from /package_signups
        orders: [],              // from /orders + user-specific
        partnerships: [],
        inquiries: [],           // workfit_inquiries, brandin_inquiries, course_inquiries, etc
        waitlists: [],
        community: [],           // posts, impact_updates, connections, etc
        submissions: []
    };

    // ---------- auth state ----------
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            userEmail = user.email || '';
            userId = user.uid;
            updateProfileUI(user);
            await fetchAllUserData();
        } else {
            // demo mode: show placeholder, but we can still load sample using known emails? 
            // for presentation, we can set a default user (e.g., mosesemugera@gmail.com)
            // we'll fake a user for demonstration based on common emails from export.
            useDemoUser();
        }
    });

    function useDemoUser() {
        // pick a common email from export: "mosesemugera@gmail.com"
        userEmail = "mosesemugera@gmail.com";
        userId = "3LtLhdjdPjenTsGAr8Lw9hsBOKS2"; // from export
        document.getElementById('displayName').innerText = "Moses Mugera";
        document.getElementById('userEmail').innerText = userEmail;
        document.getElementById('avatar').innerText = "M";
        fetchAllUserData();
    }

    async function fetchAllUserData() {
        showToast('Loading your profile...', 'info');
        try {
            // parallel fetches from relevant paths
            const [
                subsSnap, pkgSnap, ordersSnap, partnersSnap, 
                workfitInqSnap, brandinSnap, courseInqSnap, waitlistSnap,
                impactSnap, postsSnap, submissionsSnap
            ] = await Promise.all([
                database.ref('subscriptions').once('value'),
                database.ref('package_signups').once('value'),
                database.ref('orders').once('value'),
                database.ref('partnerships').once('value'),
                database.ref('workfit_inquiries').once('value'),
                database.ref('brandin_inquiries').once('value'),
                database.ref('course_inquiries').once('value'),
                database.ref('waitlists').once('value'),
                database.ref('impact_updates').once('value'),
                database.ref('feed_posts').once('value'),
                database.ref('submissions').once('value')
            ]);

            // filter by email or userId
            const emailMatch = (val) => val.email === userEmail || val.userId === userId || val.uid === userId;
            
            // subscriptions
            dbData.subscriptions = [];
            subsSnap.forEach(child => {
                const sub = child.val();
                if (sub.email === userEmail || sub.userId === userId) {
                    dbData.subscriptions.push({ id: child.key, ...sub });
                }
            });

            // package_signups
            dbData.package_signups = [];
            pkgSnap.forEach(child => {
                const p = child.val();
                if (p.email === userEmail || p.uid === userId) {
                    dbData.package_signups.push({ id: child.key, ...p });
                }
            });

            // orders (from /orders, also /users/[uid]/orders maybe)
            dbData.orders = [];
            ordersSnap.forEach(child => {
                const o = child.val();
                // order may have userEmail, userId, or be inside users
                if (o.userEmail === userEmail || o.userId === userId || o.email === userEmail) {
                    dbData.orders.push({ id: child.key, ...o });
                }
            });

            // partnerships
            dbData.partnerships = [];
            partnersSnap.forEach(child => {
                const p = child.val();
                if (p.email === userEmail || p.userId === userId) {
                    dbData.partnerships.push({ id: child.key, ...p });
                }
            });

            // inquiries combined
            dbData.inquiries = [];
            workfitInqSnap.forEach(c => { let v = c.val(); if (v.email === userEmail || v.uid === userId) dbData.inquiries.push({ type: 'workfit', id: c.key, ...v }); });
            brandinSnap.forEach(c => { let v = c.val(); if (v.email === userEmail || v.uid === userId) dbData.inquiries.push({ type: 'brandin', id: c.key, ...v }); });
            courseInqSnap.forEach(c => { let v = c.val(); if (v.email === userEmail || v.uid === userId) dbData.inquiries.push({ type: 'course', id: c.key, ...v }); });

            // waitlists
            dbData.waitlists = [];
            waitlistSnap.forEach(child => {
                let w = child.val();
                if (w.email === userEmail) dbData.waitlists.push({ id: child.key, ...w });
            });

            // community: impact_updates, feed_posts where userId matches
            dbData.community = [];
            impactSnap.forEach(c => { let v = c.val(); if (v.userId === userId || v.userId === currentUser?.uid) dbData.community.push({ type: 'impact', id: c.key, ...v }); });
            postsSnap.forEach(c => { let v = c.val(); if (v.userId === userId) dbData.community.push({ type: 'post', id: c.key, ...v }); });

            // submissions
            dbData.submissions = [];
            submissionsSnap.forEach(c => { let v = c.val(); if (v.userId === userId) dbData.submissions.push({ id: c.key, ...v }); });

            renderAllSections();
        } catch (err) {
            console.error(err);
            showToast('Error loading data', 'error');
        }
    }

    function renderAllSections() {
        renderStats();
        renderMemberships();
        renderPackages();
        renderOrders();
        renderCommunity();
        renderInquiriesWaitlist();
        renderPartnershipsSubmissions();
    }

    function renderStats() {
        const totalSubs = dbData.subscriptions.length;
        const totalPackages = dbData.package_signups.length;
        const totalOrders = dbData.orders.length;
        const totalCommunity = dbData.community.length;
        const container = document.getElementById('statsContainer');
        container.innerHTML = `
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-crown"></i></div><div class="stat-content"><h3>${totalSubs}</h3><p>subscriptions</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-dumbbell"></i></div><div class="stat-content"><h3>${totalPackages}</h3><p>fitness pkgs</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-content"><h3>${totalOrders}</h3><p>orders</p></div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-content"><h3>${totalCommunity}</h3><p>community acts</p></div></div>
        `;
    }

    function renderMemberships() {
        let html = '';
        if (dbData.subscriptions.length === 0) html = '<div class="item-card"><i class="fas fa-info-circle"></i> No active subscriptions.</div>';
        else {
            dbData.subscriptions.forEach(sub => {
                const status = sub.status || 'active';
                const statusClass = status === 'active' ? 'status-active' : (status === 'pending' ? 'status-pending' : 'status-cancelled');
                html += `<div class="item-card">
                    <span class="card-badge ${statusClass}">${status}</span>
                    <div class="card-title"><i class="fas fa-tag"></i> ${sub.tier || 'Membership'}</div>
                    <div class="card-meta">
                        <span><i class="fas fa-calendar"></i> started ${new Date(sub.startDate||sub.timestamp).toLocaleDateString()}</span>
                        <span><i class="fas fa-coins"></i> ${sub.amount || '—'} ${sub.currency || ''}</span>
                    </div>
                    ${sub.currentPeriodEnd ? `<div><i class="fas fa-hourglass-half"></i> renews ${new Date(sub.currentPeriodEnd).toLocaleDateString()}</div>` : ''}
                </div>`;
            });
        }
        document.getElementById('membershipsGrid').innerHTML = html;
    }

    function renderPackages() {
        let html = '';
        if (dbData.package_signups.length === 0) html = '<div class="item-card">No WorkFit package signups yet.</div>';
        else {
            dbData.package_signups.forEach(pkg => {
                html += `<div class="item-card">
                    <span class="card-badge status-pending">${pkg.package || 'package'}</span>
                    <div class="card-title"><i class="fas fa-user-check"></i> ${pkg.name}</div>
                    <div class="card-meta"><span><i class="fas fa-envelope"></i> ${pkg.email}</span></div>
                    <div><i class="fas fa-clock"></i> ${new Date(pkg.timestamp).toLocaleString()}</div>
                    ${pkg.status ? `<span class="status-badge status-pending">${pkg.status}</span>` : ''}
                </div>`;
            });
        }
        document.getElementById('packagesGrid').innerHTML = html;
    }

    function renderOrders() {
        let html = '';
        if (dbData.orders.length === 0) html = '<div class="item-card">No orders found.</div>';
        else {
            dbData.orders.sort((a,b) => (b.timestamp||0) - (a.timestamp||0)).forEach(order => {
                const items = order.items ? order.items.map(i => `${i.name || 'item'} x${i.quantity || 1}`).join(', ') : order.productName || 'order';
                const status = order.status || 'pending';
                const statusClass = status === 'delivered' ? 'status-active' : (status === 'cancelled' ? 'status-cancelled' : 'status-pending');
                html += `<div class="item-card">
                    <span class="card-badge ${statusClass}">${status}</span>
                    <div class="card-title"><i class="fas fa-box-open"></i> Order #${order.id?.substring(0,8)||''}</div>
                    <div class="card-meta"><span><i class="fas fa-calendar"></i> ${new Date(order.orderDate||order.timestamp).toLocaleDateString()}</span>
                    <span><i class="fas fa-money-bill"></i> KSh ${order.total || order.totalAmount || order.amount || ''}</span></div>
                    <div class="order-items"><i class="fas fa-cart-plus"></i> ${items}</div>
                </div>`;
            });
        }
        document.getElementById('ordersGrid').innerHTML = html;
    }

    function renderCommunity() {
        let html = '';
        if (dbData.community.length === 0) html = '<div class="item-card">No community activity yet.</div>';
        else {
            dbData.community.slice(0,6).forEach(act => {
                const type = act.type === 'post' ? '📝 post' : '🌟 impact';
                html += `<div class="item-card">
                    <div class="card-title"><i class="fas ${act.type==='post'?'fa-pen':'fa-star'}"></i> ${type}</div>
                    <div>${act.content || act.message || 'update'}</div>
                    <div class="card-meta"><span><i class="fas fa-heart" style="color:var(--gold);"></i> ${act.likes||0} likes</span></div>
                    <div style="color:var(--text-muted); font-size:0.8rem;">${new Date(act.timestamp).toLocaleString()}</div>
                </div>`;
            });
        }
        document.getElementById('communityGrid').innerHTML = html;
    }

    function renderInquiriesWaitlist() {
        let combined = [...dbData.inquiries, ...dbData.waitlists.map(w => ({...w, type:'waitlist'}))];
        if (combined.length === 0) document.getElementById('inquiriesGrid').innerHTML = '<div class="item-card">No inquiries or waitlist entries.</div>';
        else {
            let html = '';
            combined.slice(0,5).forEach(item => {
                html += `<div class="item-card">
                    <span class="card-badge pill-info">${item.type || 'inquiry'}</span>
                    <div class="card-title"><i class="fas fa-question-circle"></i> ${item.membershipInterest || item.plan || item.course || 'inquiry'}</div>
                    <div>${item.message || item.notes || ''}</div>
                    <div class="card-meta">${new Date(item.timestamp||item.submittedAt||Date.now()).toLocaleString()}</div>
                </div>`;
            });
            document.getElementById('inquiriesGrid').innerHTML = html;
        }
    }

    function renderPartnershipsSubmissions() {
        let items = [...dbData.partnerships.map(p => ({...p, cat:'partnership'})), ...dbData.submissions.map(s => ({...s, cat:'submission'}))];
        if (items.length === 0) document.getElementById('partnershipGrid').innerHTML = '<div class="item-card">No partnerships or challenge submissions.</div>';
        else {
            let html = '';
            items.slice(0,5).forEach(i => {
                html += `<div class="item-card">
                    <span class="card-badge">${i.cat}</span>
                    <div class="card-title"><i class="fas fa-hand-holding-heart"></i> ${i.reason || i.stepTitle || 'partnership'}</div>
                    <div>${i.amount ? 'KSh '+i.amount : ''} ${i.paymentMethod || ''}</div>
                    <div class="card-meta">${new Date(i.timestamp||i.submittedAt||Date.now()).toLocaleString()}</div>
                </div>`;
            });
            document.getElementById('partnershipGrid').innerHTML = html;
        }
    }

    function updateProfileUI(user) {
        document.getElementById('displayName').innerText = user.displayName || user.email?.split('@')[0] || 'Member';
        document.getElementById('userEmail').innerText = user.email || '';
        document.getElementById('avatar').innerText = (user.displayName || user.email || 'M').charAt(0).toUpperCase();
    }

    // theme toggle
    window.toggleTheme = function() {
        document.body.classList.toggle('light');
        const icon = document.getElementById('themeIcon');
        if (document.body.classList.contains('light')) {
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    };

    function showToast(msg, type) {
        const toast = document.getElementById('globalToast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // initial demo if no auth
    window.onload = () => {
        // if no user, useDemoUser will be called after auth check fails, but we call it after a short delay if no user
        setTimeout(() => {
            if (!currentUser) useDemoUser();
        }, 500);
    };
</script>
</body>
</html>
