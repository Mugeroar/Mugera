    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ----- RESET & VARIABLES ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fef3c7;
            --whatsapp: #25D366;
            --sonGa: #d4a017;
            --challenge: #b91c1c;
            --partners: #8B4513;
            --eye: #0284c7; 
            --tour: #9f4e96;
            --inspired: #2e7d32;
            
            /* Dark theme (default) */
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-light: #2a2a2a;
            --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.95);
            --card-bg: #151515;
            --popup-bg: rgba(0,0,0,0.95);
            --glass-bg: rgba(20,20,20,0.3);
            --glass-border: rgba(255,255,255,0.1);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.5);
            --toast-bg: rgba(20,20,20,0.95);
            --toast-border: var(--gold);
            --toast-text: #ffffff;
            --header-height: 70px;
            --search-highlight: rgba(202,138,4,0.2);
        }

        /* Light theme class */
        body.light-theme {
            --bg-primary: #f8f5f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #2d2d2d;
            --text-muted: #555555;
            --border-light: #dddddd;
            --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.95);
            --card-bg: #ffffff;
            --popup-bg: rgba(255,255,255,0.98);
            --glass-bg: rgba(255,255,255,0.2);
            --glass-border: rgba(255,255,255,0.3);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.2);
            --toast-bg: rgba(255,255,255,0.95);
            --toast-text: #1a1a1a;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
            padding-top: var(--header-height);
        }
        
        /* ----- LOADING OVERLAY ----- */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            padding: 1.5rem;
        }
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .hero-image {
            max-width: min(90%, 800px);
            max-height: 50vh;
            border-radius: 28px;
            box-shadow: 0 25px 50px -8px rgba(202,138,4,0.4);
            margin-bottom: 2rem;
            object-fit: cover;
        }
        .afrika-milele-container {
            text-align: center;
            margin-top: 1rem;
        }
        .afrika-milele {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 4px;
            color: transparent;
            background: linear-gradient(135deg, #f5e7c8, #ca8a04, #f5e7c8);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px rgba(202,138,4,0.6);
            display: inline-block;
            border-right: 4px solid var(--gold);
            padding-right: 10px;
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.8s step-end infinite;
        }
        @keyframes blinkCursor { 50% { border-color: transparent; } }
        
        /* ----- WELCOME POPUP (unchanged) ----- */
        .welcome-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .welcome-popup.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .popup-content {
            max-width: 500px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), 0 0 0 1px rgba(202,138,4,0.2) inset;
            animation: glassAppear 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        /* ... popup styles (keep original) ... */
        
        /* ----- HEADER ----- */
        .site-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold);
            z-index: 2000;
            padding: 0 1rem;
        }
        .header-container {
            max-width: 1400px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .site-logo {
            height: 48px;
            width: auto;
            border-radius: 12px;
            transition: transform 0.3s;
            border: 2px solid var(--gold);
            padding: 2px;
            background: var(--bg-primary);
        }
        
        /* Desktop actions */
        .header-desktop-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        /* ENHANCED DESKTOP SEARCH */
        .desktop-search {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 0.4rem 0.4rem 1.2rem;
            transition: all 0.3s;
            min-width: 300px;
        }
        .desktop-search:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(202,138,4,0.2);
            background: var(--bg-secondary);
        }
        .desktop-search input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            padding: 0.5rem 0;
        }
        .desktop-search input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
        .desktop-search button {
            background: var(--gold);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: black;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .desktop-search button:hover {
            transform: scale(1.05);
            background: #b8860b;
        }
        
        /* Search hints dropdown */
        .search-hints {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 0.5rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2100;
            display: none;
            backdrop-filter: blur(10px);
            max-height: 300px;
            overflow-y: auto;
        }
        .search-hints.show {
            display: block;
        }
        .hint-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-light);
        }
        .hint-item:last-child {
            border-bottom: none;
        }
        .hint-item:hover {
            background: var(--search-highlight);
            color: var(--gold);
        }
        .hint-item i {
            width: 24px;
            color: var(--gold);
            font-size: 1rem;
        }
        .hint-item .hint-category {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-left: auto;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hint-item.highlight {
            background: var(--search-highlight);
            border-left: 3px solid var(--gold);
        }
        
        /* User menu */
        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(202,138,4,0.1);
            border: 1px solid var(--gold);
            border-radius: 40px;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            cursor: pointer;
            position: relative;
        }
        .user-name {
            color: var(--gold);
            font-weight: 500;
            font-size: 0.9rem;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-avatar {
            background: var(--gold);
            color: #000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }
        .logout-dropdown {
            position: absolute;
            top: 120%;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 0.5rem;
            min-width: 120px;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 1001;
        }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item {
            padding: 0.7rem 1rem;
            color: var(--text-primary);
            border-radius: 15px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }

        /* Mobile header group */
        .mobile-header-group {
            display: none;
            align-items: center;
            gap: 0.8rem;
        }
        .mobile-search-icon, .hamburger-icon {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mobile-search-icon:hover, .hamburger-icon:hover {
            background: var(--gold);
            color: black;
        }

        /* ENHANCED MOBILE SEARCH OVERLAY */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            padding: 1rem;
            z-index: 2400;
            transform: translateY(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-overlay.open { transform: translateY(0); }
        
        .search-overlay .search-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }
        .search-overlay input {
            flex: 1;
            padding: 1.2rem 1.5rem;
            background: var(--bg-secondary);
            border: 2px solid var(--gold);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.2s;
        }
        .search-overlay input:focus {
            box-shadow: 0 0 0 4px rgba(202,138,4,0.3);
        }
        .search-overlay button {
            background: var(--gold);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: black;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .search-overlay button:hover {
            transform: scale(1.05);
        }
        .close-search {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 2.2rem;
            cursor: pointer;
            line-height: 1;
            margin-left: 0.5rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .close-search:hover {
            background: rgba(255,255,255,0.1);
            color: var(--gold);
        }

        /* Mobile search hints */
        .mobile-search-hints {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 70px; /* Space for search button */
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 0.8rem 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 2500;
            display: none;
            max-height: 350px;
            overflow-y: auto;
        }
        .mobile-search-hints.show {
            display: block;
        }
        .mobile-search-hints .hint-item {
            padding: 1.2rem 1.5rem;
            font-size: 1rem;
        }

        /* Hamburger panel */
        .hamburger-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--gold);
            padding: 2rem 1.5rem;
            z-index: 2500;
            transition: right 0.3s ease;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .hamburger-panel.open { right: 0; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 1rem;
        }
        .panel-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
        }
        .close-panel {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }
        .panel-user-area {
            background: rgba(202,138,4,0.05);
            border-radius: 30px;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .panel-user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .panel-avatar {
            width: 48px;
            height: 48px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: black;
        }
        .panel-user-name {
            font-weight: 600;
            color: var(--gold);
        }
        .panel-logout {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            border: 1px solid var(--gold);
            border-radius: 40px;
            color: var(--gold);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .panel-logout:hover { background: var(--gold); color: black; }
        .panel-quick-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .panel-link {
            padding: 0.9rem 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .panel-link:hover {
            border-color: var(--gold);
            background: rgba(202,138,4,0.1);
            color: var(--gold);
        }
        .panel-link i { width: 24px; color: var(--gold); }
        .panel-theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            margin-top: auto;
            border: 1px solid var(--border-light);
        }

        /* Hero Section (unchanged) */
        .hero-section {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.9) 100%), url('https://i.postimg.cc/xdX6vP2M/20260204-1035-Image-Generation-remix-01kgks60qgeata5pv0jy8vkg0d.webp') center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem 4rem;
            position: relative;
        }
        body.light-theme .hero-section {
            background: linear-gradient(135deg, rgba(255,245,235,0.92) 0%, rgba(255,255,255,0.95) 100%), url('https://i.postimg.cc/xdX6vP2M/20260204-1035-Image-Generation-remix-01kgks60qgeata5pv0jy8vkg0d.webp') center/cover fixed;
        }
        .hero-container {
            max-width: 1000px;
            width: 100%;
        }
        .main-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3.5rem, 10vw, 6rem);
            color: var(--gold);
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 20px var(--shadow-color);
            letter-spacing: 2px;
        }
        .main-sub {
            font-size: 1.6rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .brand-purpose {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 2rem auto 0;
            color: var(--text-muted);
            line-height: 1.8;
            border-left: 4px solid var(--gold);
            padding-left: 2rem;
            text-align: left;
            background: rgba(202,138,4,0.02);
            border-radius: 0 20px 20px 0;
        }
        
        /* Activities Section (unchanged) */
        .activities-section {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
        }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }
        .section-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .activity-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .activity-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px var(--shadow-color);
        }
        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid var(--gold);
            transition: transform 0.5s;
        }
        .activity-card:hover .card-image { transform: scale(1.02); }
        .card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-content h3 {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .card-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.2rem;
            flex: 1;
        }
        .card-link {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.2s;
            margin-top: auto;
        }
        .card-link i { font-size: 0.9rem; }
        .card-link:hover { gap: 0.8rem; }
        .feature-badge {
            display: inline-block;
            background: rgba(202,138,4,0.15);
            color: var(--gold);
            font-size: 0.7rem;

<script>

    // ========== ENHANCED SEARCH FUNCTIONALITY ==========
    
    // Search database (all searchable content)
    const searchDatabase = [
        // Activities/Sections
        { title: "Eye of Mugera", category: "Section", icon: "far fa-newspaper", keywords: ["news", "newsletter", "eye", "mugera", "weekly", "insights"], url: "eye-of-mugera.html" },
        { title: "Inspired.Me Program", category: "Section", icon: "fas fa-seedling", keywords: ["inspired", "program", "whole person", "physical", "mental", "social", "financial", "growth"], url: "inspire-program.html" },
        { title: "Shop With Us", category: "Section", icon: "fas fa-store", keywords: ["shop", "store", "buy", "merchandise", "books", "products"], url: "shop.html" },
        { title: "Partnerships", category: "Section", icon: "fas fa-handshake", keywords: ["partner", "partnership", "collaborate", "business"], url: "payments.html" },

        { title: "Afrika Milele Movement", category: "Section", icon: "fas fa-heart", keywords: ["afrika", "milele", "movement", "grassroots", "campaigns"], url: "Afrika.html" },
        { title: "Tour Series", category: "Coming Soon", icon: "fas fa-globe-africa", keywords: ["tour", "travel", "world", "cultures", "heritage"], url: "#", comingSoon: true },
        
        // Content keywords
        { title: "Weekly Newsletter", category: "Content", icon: "far fa-newspaper", keywords: ["newsletter", "weekly", "email", "updates"], section: "eye-of-mugera" },
        { title: "Whole Person Growth", category: "Content", icon: "fas fa-seedling", keywords: ["growth", "development", "holistic", "transformation"], section: "inspire-program" },
        { title: "African Renaissance", category: "Topic", icon: "fas fa-africa", keywords: ["african", "renaissance", "awakening", "culture"], section: "activities" },

    ];

    // Debounce function to prevent too many updates
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    // Search function with real-time hints
    function performSearch(query, fromHint = false) {
        if (!query || query.trim() === '') {
            showElegantMessage('Please enter a search term', 'info');
            return;
        }
        
        query = query.toLowerCase().trim();
        
        // Find matching results
        const results = searchDatabase.filter(item => {
            // Check title
            if (item.title.toLowerCase().includes(query)) return true;
            // Check keywords
            if (item.keywords.some(keyword => keyword.includes(query))) return true;
            return false;
        }).slice(0, 5); // Limit to 5 results
        
        if (results.length > 0) {
            // Navigate to first result or show results page
            if (results[0].url && results[0].url !== '#') {
                showElegantMessage(`🔍 Found: ${results[0].title}`, 'success');
                if (!fromHint) {
                    setTimeout(() => {
                        window.location.href = results[0].url;
                    }, 800);
                }
            } else if (results[0].comingSoon) {
                showElegantMessage(`✨ ${results[0].title} is coming soon!`, 'info');
            } else {
                showElegantMessage(`Found ${results.length} results for "${query}"`, 'success');
            }
        } else {
            showElegantMessage(`No results found for "${query}"`, 'info');
        }
    }

    // Generate search hints based on input
    function generateHints(query, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (!query || query.trim().length < 2) {
            container.classList.remove('show');
            container.innerHTML = '';
            return;
        }
        
        query = query.toLowerCase().trim();
        
        const matches = searchDatabase.filter(item => {
            if (item.title.toLowerCase().includes(query)) return true;
            if (item.keywords.some(k => k.includes(query))) return true;
            return false;
        }).slice(0, 5);
        
        if (matches.length === 0) {
            container.classList.remove('show');
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        matches.forEach((match, index) => {
            html += `
                <div class="hint-item" onclick="selectHint('${match.title.replace(/'/g, "\\'")}', '${match.url || '#'}', ${match.comingSoon || false})">
                    <i class="${match.icon}"></i>
                    <span>${match.title}</span>
                    <span class="hint-category">${match.category}</span>
                </div>
            `;
        });
        
        container.innerHTML = html;
        container.classList.add('show');
    }

    // Handle hint selection
    window.selectHint = function(title, url, comingSoon) {
        if (comingSoon || url === '#') {
            showElegantMessage(`✨ ${title} is coming soon!`, 'info');
        } else {
            window.location.href = url;
        }
        
        // Clear hints and search inputs
        document.getElementById('desktopSearchHints')?.classList.remove('show');
        document.getElementById('mobileSearchHints')?.classList.remove('show');
        document.getElementById('desktopSearchInput').value = title;
        document.getElementById('mobileSearchInput').value = title;
        toggleMobileSearch(); // Close mobile search if open
    };

    // Debounced hint generators
    const debouncedDesktopHints = debounce(function() {
        const query = document.getElementById('desktopSearchInput').value;
        generateHints(query, 'desktopSearchHints');
    }, 200);

    const debouncedMobileHints = debounce(function() {
        const query = document.getElementById('mobileSearchInput').value;
        generateHints(query, 'mobileSearchHints');
    }, 200);

    // Loading Animation
    (function() {
        const overlay = document.getElementById('loadingOverlay');
        const animatedSpan = document.getElementById('animatedText');
        const mainContent = document.querySelector('.page-content');
        const fullText = "Afrika Milele";
        let index = 0;
        animatedSpan.textContent = '';

        function typeNext() {
            if (index < fullText.length) {
                animatedSpan.textContent += fullText.charAt(index);
                index++;
                let delay = fullText.charAt(index-1) === ' ' ? 280 : 120;
                setTimeout(typeNext, delay);
            } else {
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    mainContent.classList.add('visible');
                    if (analytics) analytics.logEvent('page_view');
                }, 1300);
            }
        }
        setTimeout(typeNext, 400);
        setTimeout(() => {
            if (!overlay.classList.contains('hidden')) {
                overlay.classList.add('hidden');
                mainContent.classList.add('visible');
            }
        }, 7000);
    })();

    // Welcome Popup
    let popupShown = false;
    window.onload = function() {
        if (!popupShown) {
            setTimeout(() => {
                document.getElementById('welcomePopup').classList.remove('hidden');
                popupShown = true;
            }, 8000);
        }
        if (auth) {
            auth.onAuthStateChanged(updateUIForUser);
        }
        
        // Set up search event listeners
        setupSearchListeners();
    };

    // Setup search listeners
    function setupSearchListeners() {
        const desktopInput = document.getElementById('desktopSearchInput');
        const mobileInput = document.getElementById('mobileSearchInput');
        
        if (desktopInput) {
            desktopInput.addEventListener('input', debouncedDesktopHints);
            desktopInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch(this.value);
                    document.getElementById('desktopSearchHints').classList.remove('show');
                }
            });
            // Close hints when clicking outside
            document.addEventListener('click', function(e) {
                const container = document.getElementById('desktopSearchContainer');
                const hints = document.getElementById('desktopSearchHints');
                if (container && !container.contains(e.target)) {
                    hints.classList.remove('show');
                }
            });
        }
        
        if (mobileInput) {
            mobileInput.addEventListener('input', debouncedMobileHints);
            mobileInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch(this.value);
                    document.getElementById('mobileSearchHints').classList.remove('show');
                    toggleMobileSearch();
                }
            });
        }
    }

    // Popup functions
    window.closePopup = function() {
        document.getElementById('welcomePopup').classList.add('hidden');
    };

    window.showPopup = function() {
        document.getElementById('welcomePopup').classList.remove('hidden');
    };

    // Toast function
    function showElegantMessage(text, type = 'info') {
        const toast = document.getElementById('elegantToast');
        const messageSpan = document.getElementById('toastMessage');
        messageSpan.textContent = text;
        toast.className = 'message-toast ' + type;
        if (type === 'info') {
            toast.querySelector('i').className = 'fas fa-globe-africa';
        } else if (type === 'success') {
            toast.querySelector('i').className = 'fas fa-check-circle';
        }
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // Navigation functions
    window.navigateToEyeOfMugera = function() {
        closePopup();
        window.location.href = 'eye-of-mugera.html';
    };

    window.navigateToInspiredMe = function() {
        closePopup();
        window.location.href = 'inspire-program.html';
    };

    window.navigateToShop = function() {
        closePopup();
        window.location.href = 'shop.html';
    };

    window.navigateToPartnerships = function() {
        closePopup();
        window.location.href = 'payments.html';
    };

    window.navigateToSonGaPage = function() {
        closePopup();
        window.location.href = 'songa.html';

    window.toggleHamburger = function() {
        document.getElementById('hamburgerPanel').classList.toggle('open');

    window.toggleMobileSearch = function() {
        const overlay = document.getElementById('mobileSearchOverlay');
        overlay.classList.toggle('open');
        if (overlay.classList.contains('open')) {
            document.getElementById('mobileSearchInput').focus();
        } else {
            document.getElementById('mobileSearchHints').classList.remove('show');
        }
    };

    document.getElementById('hamburgerBtn').addEventListener('click', toggleHamburger);
    document.getElementById('mobileSearchBtn').addEventListener('click', toggleMobileSearch);

    // Close panels when clicking outside
    document.addEventListener('click', function(event) {
        const panel = document.getElementById('hamburgerPanel');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        if (panel.classList.contains('open') && 
            !panel.contains(event.target) && 
            !hamburgerBtn.contains(event.target)) {
            panel.classList.remove('open');
        }
    });

    // ========== AUTH FUNCTIONS ==========
    window.openAuthModal = function() {
        closePopup();
        document.getElementById('authModal').classList.remove('hidden');
    };

    window.closeAuthModal = function() {
        document.getElementById('authModal').classList.add('hidden');
    };

    window.switchAuthTab = function(tab) {
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        if (tab === 'login') {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.style.display = 'flex';
            signupForm.style.display = 'none';
        } else {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.style.display = 'flex';
            loginForm.style.display = 'none';
        }
    };

    window.handleLogin = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
            showElegantMessage('Please fill all fields', 'info');
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(email, password);
            showElegantMessage('Login successful!', 'success');
            closeAuthModal();
            if (analytics) analytics.logEvent('login', { method: 'email' });
        } catch (error) {
            showElegantMessage(error.message, 'info');
        }
    };

    window.handleSignup = async function() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        if (!name || !email || !password || !confirm) {
            showElegantMessage('All fields required', 'info');
            return;
        }
        if (password !== confirm) {
            showElegantMessage('Passwords do not match', 'info');
            return;
        }
        if (password.length < 6) {
            showElegantMessage('Password must be at least 6 characters', 'info');
            return;
        }
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: name });
            if (database) {
                await database.ref('users/' + userCredential.user.uid).set({
                    name: name,
                    email: email,
                    createdAt: Date.now()
                });
            }
            showElegantMessage('Account created! Welcome ' + name, 'success');
            closeAuthModal();
            if (analytics) analytics.logEvent('sign_up', { method: 'email' });
        } catch (error) {
            showElegantMessage(error.message, 'info');
        }
    };

    window.handleLogout = async function() {
        try {
            await auth.signOut();
            showElegantMessage('Logged out successfully', 'success');
            document.getElementById('hamburgerPanel').classList.remove('open');
        } catch (error) {
            showElegantMessage(error.message, 'info');
        }
    };

    // Update UI based on auth state
    function updateUIForUser(user) {
        // Desktop elements
        const userMenu = document.getElementById('userMenuDesktop');
        const loginBtn = document.getElementById('loginButtonDesktop');
        const userNameSpan = document.getElementById('userDisplayNameDesktop');
        const userAvatar = document.getElementById('userAvatarDesktop');
        
        // Panel elements (simplified for brevity - add full panel logic if needed)
        const panelLoggedOut = document.getElementById('panelLoggedOut');
        const panelLoggedIn = document.getElementById('panelLoggedIn');
        const panelAvatar = document.getElementById('panelAvatar');
        const panelUserName = document.getElementById('panelUserName');

        if (user) {
            let displayName = user.displayName;
            if (!displayName && user.email) {
                displayName = user.email.split('@')[0];
            }
            if (displayName) {
                displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
            } else {
                displayName = 'Mugera';
            }
            
            // Desktop
            userNameSpan.textContent = displayName;
            userAvatar.textContent = displayName.charAt(0).toUpperCase();
            userMenu.style.display = 'flex';
            loginBtn.style.display = 'none';
            
            // Panel
            if (panelLoggedOut && panelLoggedIn) {
                panelLoggedOut.style.display = 'none';
                panelLoggedIn.style.display = 'flex';
                if (panelAvatar) panelAvatar.textContent = displayName.charAt(0).toUpperCase();
                if (panelUserName) panelUserName.textContent = displayName;
            }
        } else {
            // Desktop
            userMenu.style.display = 'none';
            loginBtn.style.display = 'flex';
            
            // Panel
            if (panelLoggedOut && panelLoggedIn) {
                panelLoggedOut.style.display = 'flex';
                panelLoggedIn.style.display = 'none';
            }
        }
    }

    // Theme toggle
    function toggleTheme() {
        const body = document.body;
        const panelThemeIcon = document.getElementById('panelThemeIcon');
        const metaThemeColor = document.getElementById('themeColor');
        
        if (body.classList.contains('light-theme')) {
            body.classList.remove('light-theme');
            if (panelThemeIcon) {
                panelThemeIcon.classList.remove('fa-sun');
                panelThemeIcon.classList.add('fa-moon');
            }
            localStorage.setItem('siteTheme', 'dark');
            if (metaThemeColor) metaThemeColor.setAttribute('content', '#ca8a04');
        } else {
            body.classList.add('light-theme');
            if (panelThemeIcon) {
                panelThemeIcon.classList.remove('fa-moon');
                panelThemeIcon.classList.add('fa-sun');
            }
            localStorage.setItem('siteTheme', 'light');
            if (metaThemeColor) metaThemeColor.setAttribute('content', '#f8f5f0');
        }
    }
    window.toggleTheme = toggleTheme;

    // Initialize theme from localStorage
    (function initTheme() {
        const savedTheme = localStorage.getItem('siteTheme');
        const body = document.body;
        const panelThemeIcon = document.getElementById('panelThemeIcon');
        const metaThemeColor = document.getElementById('themeColor');
        
        if (savedTheme === 'light') {
            body.classList.add('light-theme');
            if (panelThemeIcon) {
                panelThemeIcon.classList.remove('fa-moon');
                panelThemeIcon.classList.add('fa-sun');
            }
            if (metaThemeColor) metaThemeColor.setAttribute('content', '#f8f5f0');
        } else {
            body.classList.remove('light-theme');
            if (panelThemeIcon) {
                panelThemeIcon.classList.remove('fa-sun');
                panelThemeIcon.classList.add('fa-moon');
            }
            if (metaThemeColor) metaThemeColor.setAttribute('content', '#ca8a04');
        }
    })();

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installButton').classList.add('show');
    });

    document.getElementById('installButton').addEventListener('click', async () => {
        const btn = document.getElementById('installButton');
        btn.classList.remove('show');
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
