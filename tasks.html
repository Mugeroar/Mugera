<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">          
    <meta name="theme-color" content="#ca8a04">
    <meta name="background-color" content="#0a0a0a">
    <meta name="color-scheme" content="dark light">
    <title>My Tasks · I AM MUGERA</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* [Keep all CSS from previous version - it's the same] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fef3c7;
            --danger: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --teal: #14b8a6;
            --indigo: #6366f1;
            
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-light: #2a2a2a;
            --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.95);
            --card-bg: #151515;
            --glass-bg: rgba(20,20,20,0.3);
            --glass-border: rgba(255,255,255,0.1);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.5);
            --toast-bg: rgba(20,20,20,0.95);
            --toast-border: var(--gold);
            --header-height: 70px;
            --input-bg: rgba(255,255,255,0.05);
            --input-focus-bg: rgba(255,255,255,0.1);
            
            /* Status Colors */
            --status-pending: #f59e0b;
            --status-active: #10b981;
            --status-completed: #3b82f6;
            --status-cancelled: #ef4444;
        }

        body.light-theme {
            --bg-primary: #f8f5f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #2d2d2d;
            --text-muted: #555555;
            --border-light: #dddddd;
            --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.95);
            --card-bg: #ffffff;
            --input-bg: rgba(0,0,0,0.03);
            --input-focus-bg: rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--header-height);
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
        }

        /* Header */
        .site-header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); z-index: 2000; padding: 0 1rem;
        }
        .header-container {
            max-width: 1400px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .site-logo {
            height: 48px; border-radius: 12px; border: 2px solid var(--gold);
            padding: 2px; background: var(--bg-primary);
            content: url('https://i.postimg.cc/bwkN851g/20260304_1008_Image_Generation_remix_01kjvtr63ce54v1awen6j4n88x-1.webp');
        }
        .header-desktop-actions { display: flex; align-items: center; gap: 1.5rem; }
        
        .user-menu {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(202,138,4,0.1); border: 1px solid var(--gold);
            border-radius: 40px; padding: 0.3rem 0.3rem 0.3rem 1rem;
            cursor: pointer; position: relative;
        }
        .user-avatar {
            background: var(--gold); color: #000; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
        .logout-dropdown {
            position: absolute; top: 120%; right: 0;
            background: var(--card-bg); border: 1px solid var(--gold);
            border-radius: 20px; padding: 0.5rem;
            min-width: 120px; display: none; z-index: 1001;
        }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item {
            padding: 0.7rem 1rem; color: var(--text-primary);
            border-radius: 15px; transition: 0.2s;
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
        }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }
        
        .mobile-header-group { display: none; align-items: center; gap: 0.8rem; }
        .hamburger-icon {
            border: 1px solid var(--gold); color: var(--gold);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
        }
        .hamburger-icon:hover { background: var(--gold); color: black; }

        /* Hamburger panel */
        .hamburger-panel {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-left: 1px solid var(--gold); padding: 2rem 1.5rem;
            z-index: 2500; transition: right 0.3s ease; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .hamburger-panel.open { right: 0; }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-light); padding-bottom: 1rem;
        }
        .panel-header h3 { font-family: 'Cinzel', serif; color: var(--gold); }
        .close-panel {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 1.8rem; cursor: pointer; line-height: 1;
        }
        .panel-user-area {
            background: rgba(202,138,4,0.05);
            border-radius: 30px;
            padding: 1rem;
            border: 1px solid var(--border-light);
            margin: 1.5rem 0;
        }
        .panel-user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .panel-avatar {
            width: 48px; height: 48px;
            background: var(--gold); color: black;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
        }
        .panel-user-name {
            font-weight: 600;
            color: var(--gold);
        }
        .panel-logout {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            border: 1px solid var(--gold);
            border-radius: 40px;
            color: var(--gold);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .panel-logout:hover {
            background: var(--gold);
            color: black;
        }
        .panel-quick-links {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .panel-link {
            padding: 0.9rem 1rem; background: rgba(255,255,255,0.03);
            border-radius: 30px; color: var(--text-primary); text-decoration: none;
            display: flex; align-items: center; gap: 1rem; transition: 0.2s;
            border: 1px solid transparent;
        }
        .panel-link:hover {
            border-color: var(--gold); background: rgba(202,138,4,0.1); color: var(--gold);
        }
        .panel-link i { width: 24px; color: var(--gold); }
        .panel-theme-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 40px;
            margin-top: auto; border: 1px solid var(--border-light);
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .role-badge {
            padding: 0.5rem 1.5rem;
            background: rgba(202,138,4,0.1);
            border: 1px solid var(--gold);
            border-radius: 40px;
            color: var(--gold);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Provider Profile Section */
        .provider-profile {
            background: linear-gradient(135deg, rgba(202,138,4,0.1), rgba(20,20,20,0.9));
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .provider-avatar {
            width: 80px;
            height: 80px;
            background: rgba(202,138,4,0.15);
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--gold);
        }

        .provider-info {
            flex: 1;
        }

        .provider-info h2 {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .provider-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .provider-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .provider-meta-item i {
            color: var(--gold);
            width: 18px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 1px solid rgba(202,138,4,0.2);
        }

        .filter-select {
            padding: 0.6rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-width: 150px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .search-input {
            padding: 0.6rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            color: var(--text-primary);
            min-width: 250px;
            flex: 1;
        }

        /* Tasks Table */
        .table-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.2rem 1.5rem;
            background: rgba(202,138,4,0.1);
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(202,138,4,0.1);
            color: var(--text-secondary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(202,138,4,0.05);
        }

        /* Status Badges */
        .status-badge {
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: rgba(245,158,11,0.15);
            color: var(--warning);
            border: 1px solid rgba(245,158,11,0.3);
        }

        .status-active, .status-out-for-delivery {
            background: rgba(16,185,129,0.15);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.3);
        }

        .status-completed, .status-delivered {
            background: rgba(59,130,246,0.15);
            color: var(--info);
            border: 1px solid rgba(59,130,246,0.3);
        }

        .status-cancelled {
            background: rgba(220,38,38,0.15);
            color: var(--danger);
            border: 1px solid rgba(220,38,38,0.3);
        }

        /* Action Buttons */
        .action-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-right: 0.3rem;
        }

        .action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .action-btn.accept:hover {
            border-color: var(--success);
            color: var(--success);
        }

        .action-btn.reject:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn.complete:hover {
            border-color: var(--info);
            color: var(--info);
        }

        /* CTA Section for Non-Providers */
        .cta-section {
            background: linear-gradient(135deg, rgba(202,138,4,0.2), rgba(20,20,20,0.95));
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 3rem;
            margin: 2rem 0;
            text-align: center;
        }

        .cta-icon {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .cta-title {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .cta-text {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
            font-size: 1.1rem;
        }

        .cta-features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .cta-feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .cta-feature i {
            color: var(--gold);
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-btn {
            padding: 1rem 2.5rem;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 50px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            text-decoration: none;
        }

        .cta-btn:hover {
            background: var(--gold);
            color: black;
        }

        .cta-btn.primary {
            background: var(--gold);
            color: black;
        }

        .cta-btn.primary:hover {
            background: #b8860b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(202,138,4,0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 9499;
            display: none;
        }
        .modal-overlay.active { display: block; }
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 30px;
            border: 2px solid var(--gold);
            z-index: 9500;
            max-width: 500px;
            width: 90%;
            display: none;
        }
        .modal.active { display: block; animation: modalFadeIn 0.3s; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translate(-50%,-60%); }
            to { opacity: 1; transform: translate(-50%,-50%); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .modal-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
        }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-body {
            margin-bottom: 1.5rem;
        }
        .modal-field {
            margin-bottom: 1rem;
        }
        .modal-field label {
            display: block;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }
        .modal-field .field-value {
            padding: 0.8rem;
            background: var(--input-bg);
            border-radius: 12px;
            color: var(--text-primary);
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* Loading and Toast */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(202,138,4,0.2);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 10001;
        }
        .toast {
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--gold);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 300px;
            animation: slideInRight 0.3s ease;
            border: 1px solid rgba(202,138,4,0.3);
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--info); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .header-desktop-actions { display: none; }
            .mobile-header-group { display: flex; }
            .main-content { padding: 1rem; }
            .provider-profile { flex-direction: column; text-align: center; }
            .provider-meta { justify-content: center; }
            .filters { flex-direction: column; }
            .table-container { overflow-x: auto; }
            table { min-width: 800px; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal for task details -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal" id="detailsModal">
        <div class="modal-header">
            <h3 id="modalTitle">Task Details</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Dynamic content -->
        </div>
        <div class="modal-actions">
            <button class="action-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <!-- Header -->
    <header class="site-header">
        <div class="header-container">
            <div style="display: flex; align-items: center;">
                <img src="https://i.postimg.cc/bwkN851g/20260304_1008_Image_Generation_remix_01kjvtr63ce54v1awen6j4n88x-1.webp" alt="I AM MUGERA" class="site-logo">
            </div>
            <div class="header-desktop-actions">
                <div id="userMenuDesktop" class="user-menu">
                    <span class="user-name" id="userDisplayNameDesktop">Profile</span>
                    <div class="user-avatar" id="userAvatarDesktop">U</div>
                    <div class="logout-dropdown">
                        <div class="logout-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
                    </div>
                </div>
            </div>
            <div class="mobile-header-group">
                <div class="hamburger-icon" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
            </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",

        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Global state
        let currentUser = null;
        let userData = {};
        let userRole = null; // 'assistant', 'driver', 'instructor', null
        let tasks = [];
        let filteredTasks = [];

        // ========== AUTH STATE LISTENER ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;

        // ========== LOAD USER DATA ==========
        async function loadUserData() {
            try {
                // Load from users node
                const userSnapshot = await database.ref(`users/${currentUser.uid}`).once('value');
                if (userSnapshot.exists()) {
                    userData = userSnapshot.val();
                } else {
                    // Create basic user record if it doesn't exist
                    userData = {
                        name: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                        email: currentUser.email,
                        createdAt: new Date().toISOString(),
                        uid: currentUser.uid
                    };
                    await database.ref(`users/${currentUser.uid}`).set(userData);
                }
                
                console.log('User data loaded:', userData);
                updateUserUI();
                
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        function updateUserUI() {
            const displayName = userData.name || currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
            document.getElementById('userDisplayNameDesktop').textContent = displayName;
            document.getElementById('panelUserName').textContent = displayName;
            
            const initial = displayName.charAt(0).toUpperCase();
            document.getElementById('userAvatarDesktop').textContent = initial;
            document.getElementById('panelAvatar').textContent = initial;
        }

        // ========== DETERMINE USER ROLE ==========
        async function determineUserRole() {
            console.log('Checking roles for user:', currentUser.uid);
            
            // Reset role
            userRole = null;
            
            try {
                // Check if delivery assistant - using delivery_assistants node
                const assistantSnapshot = await database.ref(`delivery_assistants/${currentUser.uid}`).once('value');
                console.log('Assistant check:', assistantSnapshot.exists(), assistantSnapshot.val());
                
                if (assistantSnapshot.exists()) {
                    const assistantData = assistantSnapshot.val();
                    // Check if active or verified
                    if (assistantData.status === 'active' || assistantData.verified === true) {
                        userRole = 'assistant';
                        userData = { ...userData, ...assistantData };
                        console.log('User is a delivery assistant');
                        return;
                    }
                }
                
                // Check if driver - using drivers node
                const driverSnapshot = await database.ref(`drivers/${currentUser.uid}`).once('value');
                console.log('Driver check:', driverSnapshot.exists(), driverSnapshot.val());
                
                if (driverSnapshot.exists()) {
                    const driverData = driverSnapshot.val();
                    if (driverData.status === 'active') {
                        userRole = 'driver';
                        userData = { ...userData, ...driverData };
                        console.log('User is a driver');
                        return;
                    }
                }
                
                // Check if instructor - using instructors node
                const instructorSnapshot = await database.ref(`instructors/${currentUser.uid}`).once('value');
                console.log('Instructor check:', instructorSnapshot.exists(), instructorSnapshot.val());
                
                if (instructorSnapshot.exists()) {
                    const instructorData = instructorSnapshot.val();
                    if (instructorData.status === 'active') {
                        userRole = 'instructor';
                        userData = { ...userData, ...instructorData };
                        console.log('User is an instructor');
                        return;
                    }
                }
                
                // Also check if there are any orders assigned to this user (they might be an assistant without record)
                const ordersSnapshot = await database.ref('orders')
                    .orderByChild('assignedTo')
                    .equalTo(currentUser.uid)
                    .once('value');
                
                if (ordersSnapshot.exists() && ordersSnapshot.val()) {
                    const orders = ordersSnapshot.val();
                    const orderCount = Object.keys(orders).length;
                    console.log(`User has ${orderCount} assigned orders - treating as assistant`);
                    
                    // If they have assigned orders, they're likely an assistant
                    if (orderCount > 0) {
                        userRole = 'assistant';
                        // Create assistant record if it doesn't exist
                        const checkExisting = await database.ref(`delivery_assistants/${currentUser.uid}`).once('value');
                        if (!checkExisting.exists()) {
                            await database.ref(`delivery_assistants/${currentUser.uid}`).set({
                                name: userData.name || currentUser.displayName || 'Assistant',
                                email: currentUser.email,
                                phone: userData.phone || '',
                                status: 'active',
                                verified: true
                            });
                        }
                        return;
                    }
                }
                
                console.log('User has no provider role');
                
            } catch (error) {
                console.error('Error determining user role:', error);
            }
        }

        // ========== RENDER PAGE BASED ON ROLE ==========
        function renderPage() {
            if (userRole) {
                renderProviderPage();
            } else {
                renderNonProviderPage();
            }
        }

        // ========== LOAD PROVIDER TASKS ==========
        async function loadProviderTasks() {
            try {
                console.log('Loading tasks for provider:', currentUser.uid);
                
                const snapshot = await database.ref('orders')
                    .orderByChild('assignedTo')
                    .equalTo(currentUser.uid)
                    .once('value');
                
                const data = snapshot.val() || {};
                console.log('Tasks loaded:', data);
                
                tasks = Object.entries(data).map(([id, order]) => {
                    // Parse date properly
                    let timestamp = 0;
                    if (order.deliveryDate) {
                        timestamp = new Date(order.deliveryDate).getTime();
                    } else if (order.orderDate) {
                        timestamp = new Date(order.orderDate).getTime();
                    } else if (order.timestamp) {
                        timestamp = order.timestamp;
                    }
                    
                    return {
                        id,
                        orderId: id,
                        date: order.deliveryDate || order.orderDate || null,
                        customerName: order.userName || order.fullName || 'Unknown',
                        customerPhone: order.userPhone || order.phone || '',
                        address: order.deliveryAddress || order.address || 'No address',
                        deliveryFee: order.deliveryFee || 150,
                        status: order.status || 'pending',
                        items: order.items || [],
                        timestamp: timestamp
                    };
                });

                // Sort by date (newest first)
                tasks.sort((a, b) => b.timestamp - a.timestamp);
                filteredTasks = [...tasks];
                
                console.log('Processed tasks:', tasks.length);
                
            } catch (error) {
                console.error('Error loading tasks:', error);
                tasks = [];
                filteredTasks = [];
            }
        }

            const pendingTasks = tasks.filter(t => t.status === 'pending').length;

            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `

                <!-- Provider Profile -->
                <div class="provider-profile">

                    </div>

                            <div class="provider-meta-item">
                                <i class="fas fa-phone"></i>
                                <span>${providerPhone}</span>
                            </div>
                            ${userRole === 'assistant' ? `
                                <div class="provider-meta-item">
                                    <i class="fas fa-motorcycle"></i>
                                    <span>${providerVehicle}</span>
                                </div>
                            ` : ''}

                <!-- Stats Cards -->
                <div class="stats-grid">

                    </div>
                </div>

                <!-- Filters -->
                <div class="filters">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search by order ID, customer...">
                    <select class="filter-select" id="statusFilter">
                        <option value="all">All Status</option>

                    </select>
                    <button class="action-btn" onclick="refreshTasks()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>

                <!-- Tasks Table -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>

            // Add event listeners
            document.getElementById('searchInput')?.addEventListener('input', filterTasks);
            document.getElementById('statusFilter')?.addEventListener('change', filterTasks);
        }

        // ========== RENDER TASKS TABLE ==========
        function renderTasksTable() {
            if (filteredTasks.length === 0) {
                return '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No tasks found</td></tr>';
            }

            let html = '';
            filteredTasks.slice(0, 20).forEach(task => {
                const date = task.date ? new Date(task.date).toLocaleDateString() : 'N/A';
                let statusClass = 'status-pending';
                
                if (task.status === 'active' || task.status === 'out-for-delivery') {
                    statusClass = 'status-active';
                } else if (task.status === 'completed' || task.status === 'delivered') {
                    statusClass = 'status-completed';
                } else if (task.status === 'cancelled') {
                    statusClass = 'status-cancelled';
                }

                html += `
                    <tr>
                        <td>#${task.id.slice(-8)}</td>
                        <td>${date}</td>
                        <td>
                            ${task.customerName}<br>
                            <small style="color: var(--text-muted);">${task.customerPhone || ''}</small>
                        </td>
                        <td>${task.address}</td>
                        <td><span style="color: var(--gold);">KSh ${task.deliveryFee}</span></td>
                        <td><span class="status-badge ${statusClass}">${task.status}</span></td>
                        <td>
                            <button class="action-btn view" onclick="viewTaskDetails('${task.id}')" title="View Details">
                                <i class="fas fa-eye"></i>
                            </button>
                            ${task.status === 'pending' ? `
                                <button class="action-btn accept" onclick="acceptTask('${task.id}')" title="Accept">
                                    <i class="fas fa-check"></i>
                                </button>
                            ` : ''}
                            ${task.status === 'active' || task.status === 'out-for-delivery' ? `
                                <button class="action-btn complete" onclick="completeTask('${task.id}')" title="Complete">
                                    <i class="fas fa-check-double"></i>
                                </button>
                            ` : ''}
                        </td>
                    </tr>
                `;
            });
            
            return html;
        }

        // ========== RENDER NON-PROVIDER PAGE ==========
        function renderNonProviderPage() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- Page Header -->
                <div class="page-header">

        // ========== TASK FILTERING ==========
        window.filterTasks = function() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';

            filteredTasks = tasks.filter(task => {
                const matchesSearch = 
                    task.id.toLowerCase().includes(searchTerm) ||
                    task.customerName.toLowerCase().includes(searchTerm) ||
                    task.customerPhone?.toLowerCase().includes(searchTerm);
                
                const matchesStatus = statusFilter === 'all' || task.status === statusFilter;
                
                return matchesSearch && matchesStatus;
            });

            const tbody = document.getElementById('tasksTableBody');
            if (tbody) {
                tbody.innerHTML = renderTasksTable();
            }
        };

        // ========== TASK ACTIONS ==========
        window.viewTaskDetails = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            let itemsHtml = '';
            if (task.items && task.items.length > 0) {
                itemsHtml = '<ul style="list-style: none; padding: 0;">';
                task.items.forEach(item => {
                    itemsHtml += `<li style="margin-bottom: 0.5rem;">• ${item.name || 'Product'} x${item.quantity || 1}</li>`;
                });
                itemsHtml += '</ul>';
            } else {
                itemsHtml = '<p>No items listed</p>';
            }

            const content = `
                <div class="modal-field">
                    <label>Order ID</label>
                    <div class="field-value">#${task.id}</div>
                </div>
                <div class="modal-field">
                    <label>Customer</label>
                    <div class="field-value">
                        <strong>${task.customerName}</strong><br>
                        📞 ${task.customerPhone || 'No phone'}
                    </div>
                </div>
                <div class="modal-field">
                    <label>Delivery Address</label>
                    <div class="field-value">${task.address}</div>
                </div>
                <div class="modal-field">
                    <label>Items</label>
                    <div class="field-value">${itemsHtml}</div>
                </div>
                <div class="modal-field">
                    <label>Delivery Fee</label>
                    <div class="field-value"><span style="color: var(--gold);">KSh ${task.deliveryFee}</span></div>
                </div>
                <div class="modal-field">
                    <label>Status</label>
                    <div class="field-value"><span class="status-badge status-${task.status}">${task.status}</span></div>
                </div>
            `;

            document.getElementById('modalTitle').textContent = 'Task Details';
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('detailsModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        };

        window.acceptTask = async function(taskId) {
            if (!confirm('Accept this task?')) return;

            showLoading(true);
            try {
                await database.ref(`orders/${taskId}`).update({
                    status: 'active',
                    acceptedAt: new Date().toISOString(),
                    statusHistory: [
                        ...(tasks.find(t => t.id === taskId)?.statusHistory || []),
                        {
                            status: 'active',
                            timestamp: new Date().toISOString(),
                            note: 'Accepted by provider'
                        }
                    ]
                });
                showToast('Task accepted successfully', 'success');
                await loadProviderTasks();
                filterTasks();
            } catch (error) {
                console.error('Error accepting task:', error);
                showToast('Failed to accept task', 'error');
            } finally {
                showLoading(false);
            }
        };

        window.completeTask = async function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const customerName = prompt('Enter customer name for confirmation:');
            if (!customerName) return;

            showLoading(true);
            try {
                await database.ref(`orders/${taskId}`).update({
                    status: 'completed',
                    completedAt: new Date().toISOString(),
                    deliveryDate: new Date().toISOString(),
                    completionProof: {
                        customerName: customerName,
                        timestamp: new Date().toISOString()
                    },
                    statusHistory: [
                        ...(tasks.find(t => t.id === taskId)?.statusHistory || []),
                        {
                            status: 'completed',
                            timestamp: new Date().toISOString(),
                            note: `Completed - received by ${customerName}`
                        }
                    ]
                });
                showToast('Task completed successfully', 'success');
                await loadProviderTasks();
                filterTasks();
            } catch (error) {
                console.error('Error completing task:', error);
                showToast('Failed to complete task', 'error');
            } finally {
                showLoading(false);
            }
        };

        window.refreshTasks = function() {
            if (userRole) {
                loadProviderTasks().then(() => {
                    filterTasks();
                    showToast('Tasks refreshed', 'success');
                });
            }
        };

        // ========== NAVIGATION ==========
        window.upgradeToPro = function() {
            window.location.href = 'upgrade.html';
        };

        window.learnMore = function() {
            window.location.href = 'pro-account.html';
        };

        // ========== UTILITY FUNCTIONS ==========
        window.closeModal = function() {
            document.getElementById('detailsModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        };

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = { 
                success: 'check-circle', 
                error: 'exclamation-circle', 
                warning: 'exclamation-triangle', 
                info: 'info-circle' 
            };
            toast.innerHTML = `<i class="fas fa-${icons[type]}"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function startAutoRefresh() {
            setInterval(() => {
                if (userRole) {
                    loadProviderTasks().then(filterTasks);
                }
            }, 60000); // Refresh every minute
        }

        // ========== HANDLE LOGOUT ==========
        window.handleLogout = async () => {
            try {
                showLoading(true);
                await auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                showToast('Logout failed', 'error');
                showLoading(false);
            }
        };

        // ========== TOGGLE HAMBURGER ==========
        window.toggleHamburger = function() {
            document.getElementById('hamburgerPanel').classList.toggle('open');
        };

        document.getElementById('hamburgerBtn')?.addEventListener('click', toggleHamburger);

        document.addEventListener('click', function(e) {
            const panel = document.getElementById('hamburgerPanel');
            const btn = document.getElementById('hamburgerBtn');
            if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('open');
            }
        });

        // ========== THEME TOGGLE ==========
        window.toggleTheme = function() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('panelThemeIcon');
            icon.classList.toggle('fa-moon', !document.body.classList.contains('light-theme'));
            icon.classList.toggle('fa-sun', document.body.classList.contains('light-theme'));
            localStorage.setItem('siteTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        };

        if (localStorage.getItem('siteTheme') === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('panelThemeIcon').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
