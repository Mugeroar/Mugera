<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>I AM MUGERA · Social Hub</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ca8a04" id="themeColor">
    <meta name="background-color" content="#0a0a0a" id="bgColorMeta">
    <meta name="color-scheme" content="dark light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="I AM MUGERA">
    <meta name="application-name" content="I AM MUGERA">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#ca8a04">
    
    <!-- Version & Build -->
    <meta name="version" content="6.1.0">
    <meta name="build-date" content="2025-03-06">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* ----- EXACT MAIN PAGE STYLES (preserved) ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fef3c7;
            --whatsapp: #25D366;
            --eye: #0284c7; 
            --tour: #9f4e96;
            --inspired: #2e7d32;
            --danger: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-light: #2a2a2a;
            --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.95);
            --card-bg: #151515;
            --popup-bg: rgba(0,0,0,0.95);
            --glass-bg: rgba(20,20,20,0.3);
            --glass-border: rgba(255,255,255,0.1);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.5);
            --toast-bg: rgba(20,20,20,0.95);
            --toast-border: var(--gold);
            --toast-text: #ffffff;
            --header-height: 70px;
            --search-highlight: rgba(202,138,4,0.2);
            --input-bg: rgba(255,255,255,0.05);
            --input-focus-bg: rgba(255,255,255,0.1);
            --error-color: #ef4444;
            --success-color: #10b981;
            --gradient-start: rgba(202,138,4,0.1);
            --gradient-end: transparent;

            --status-open: #10b981;
            --status-soon: #f59e0b;
            --status-closing: #ef4444;
            --status-closed: #6b7280;

            /* social-specific */
            --post-bg: #1a1a1a;
            --hover-bg: #222222;
            --like-color: #f91880;
            --dislike-color: #6b7280;
            --resolved-badge: #10b981;
        }

        body.light-theme {
            --bg-primary: #f8f5f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #2d2d2d;
            --text-muted: #555555;
            --border-light: #dddddd;
            --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.95);
            --card-bg: #ffffff;
            --popup-bg: rgba(255,255,255,0.98);
            --glass-bg: rgba(255,255,255,0.2);
            --glass-border: rgba(255,255,255,0.3);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.2);
            --toast-bg: rgba(255,255,255,0.95);
            --toast-text: #1a1a1a;
            --input-bg: rgba(0,0,0,0.03);
            --input-focus-bg: rgba(0,0,0,0.05);
            --gradient-start: rgba(202,138,4,0.05);
            --gradient-end: rgba(255,255,255,0.5);
            --post-bg: #f0f0f0;
            --hover-bg: #e5e5e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
            padding-top: var(--header-height);
        }
        
        /* ----- HEADER (exact copy from main) ----- */
        .site-header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: var(--header-height); 
            background: var(--nav-bg); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--gold); 
            z-index: 2000; 
            padding: 0 1rem; 
        }
        .header-container { 
            max-width: 1400px; 
            height: 100%; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .site-logo { 
            height: 48px; 
            border-radius: 12px; 
            transition: transform 0.3s; 
            border: 2px solid var(--gold); 
            padding: 2px; 
            background: var(--bg-primary); 
        }
        .header-desktop-actions { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
        }
        .desktop-search { 
            position: relative; 
            display: flex; 
            align-items: center; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid var(--border-light); 
            border-radius: 40px; 
            padding: 0.4rem 0.4rem 0.4rem 1.2rem; 
            transition: all 0.3s; 
            min-width: 300px; 
        }
        .desktop-search input { 
            background: transparent; 
            border: none; 
            color: var(--text-primary); 
            font-size: 0.95rem; 
            width: 100%; 
            outline: none; 
            padding: 0.5rem 0; 
        }
        .desktop-search input::placeholder { color: var(--text-muted); font-style: italic; }
        .desktop-search button { 
            background: var(--gold); 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            color: black; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .user-menu { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            background: rgba(202,138,4,0.1); 
            border: 1px solid var(--gold); 
            border-radius: 40px; 
            padding: 0.3rem 0.3rem 0.3rem 1rem; 
            cursor: pointer; 
            position: relative; 
        }
        .user-name { color: var(--gold); font-weight: 500; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-avatar { 
            background: var(--gold); color: #000; width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
        }
        .logout-dropdown { 
            position: absolute; top: 120%; right: 0; background: var(--card-bg); border: 1px solid var(--gold); 
            border-radius: 20px; padding: 0.5rem; min-width: 120px; display: none; z-index: 1001; 
        }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item { 
            padding: 0.7rem 1rem; color: var(--text-primary); border-radius: 15px; 
            display: flex; align-items: center; gap: 0.5rem; 
        }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }
        .mobile-header-group { display: none; align-items: center; gap: 0.8rem; }
        .mobile-search-icon, .hamburger-icon { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.3rem; cursor: pointer; 
        }
        .hamburger-panel { 
            position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; 
            background: var(--nav-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--gold); 
            padding: 2rem 1.5rem; z-index: 2500; transition: right 0.3s ease; 
            display: flex; flex-direction: column; gap: 1.5rem; 
        }
        .hamburger-panel.open { right: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 1rem; }
        .panel-header h3 { font-family: 'Cinzel', serif; color: var(--gold); }
        .close-panel { background: transparent; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; }
        .panel-user-area { background: rgba(202,138,4,0.05); border-radius: 30px; padding: 1rem; border: 1px solid var(--border-light); }
        .panel-user-info { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
        .panel-avatar { width: 48px; height: 48px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; }
        .panel-user-name { font-weight: 600; color: var(--gold); }
        .panel-logout { width: 100%; padding: 0.7rem; background: transparent; border: 1px solid var(--gold); border-radius: 40px; color: var(--gold); display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; }
        .panel-quick-links { display: flex; flex-direction: column; gap: 0.5rem; }
        .panel-link { padding: 0.9rem 1rem; background: rgba(255,255,255,0.03); border-radius: 30px; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 1rem; transition: 0.2s; border: 1px solid transparent; }
        .panel-link:hover { border-color: var(--gold); background: rgba(202,138,4,0.1); color: var(--gold); }
        .panel-link i { width: 24px; color: var(--gold); }
        .panel-theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 40px; margin-top: auto; border: 1px solid var(--border-light); }
        @media (max-width: 768px) { 
            .header-desktop-actions { display:none; } 
            .mobile-header-group { display:flex; } 
        }

        /* ----- SOCIAL FEED WITH COLLAPSIBLE POSTS ----- */
        .social-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .compose-tweet {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--gold);
        }
        .compose-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .compose-header h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.5rem;
        }
        .compose-input textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 1.2rem 1.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            font-family: 'Inter', sans-serif;
            margin-bottom: 1rem;
        }
        .compose-input textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(202,138,4,0.2);
        }
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .service-selector {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }
        .service-selector:focus {
            border-color: var(--gold);
        }
        .post-btn {
            background: var(--gold);
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            color: black;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .post-btn:hover {
            background: var(--gold-dark);
            transform: scale(1.02);
        }
        .post-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* feed */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .post-card {
            background: var(--post-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .post-card:hover {
            border-color: var(--gold);
            background: var(--hover-bg);
        }
        .post-card.expanded {
            background: var(--card-bg);
            border: 2px solid var(--gold);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
        }
        .post-author-info {
            display: flex;
            flex-direction: column;
        }
        .post-author-name {
            font-weight: 700;
            color: var(--gold);
            font-size: 1rem;
        }
        .post-author-handle {
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .post-service-tag {
            background: rgba(202,138,4,0.15);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            color: var(--gold);
            margin-left: auto;
        }
        .admin-badge {
            background: var(--gold);
            color: black;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }
        .resolved-badge {
            background: var(--resolved-badge);
            color: black;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .post-preview {
            margin: 0.5rem 0 0.5rem 3rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .expanded .post-preview {
            display: none;
        }
        .post-content-full {
            display: none;
            margin: 1rem 0 1.2rem 3rem;
            font-size: 1.05rem;
            word-break: break-word;
            background: var(--input-bg);
            padding: 1rem 1.5rem;
            border-radius: 25px;
        }
        .expanded .post-content-full {
            display: block;
        }
        .post-stats {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin: 0.5rem 0 0 3rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .post-stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .post-stat:hover {
            color: var(--gold);
        }
        .post-stat.liked {
            color: var(--like-color);
        }
        .post-stat.disliked {
            color: var(--dislike-color);
        }
        .expanded-content {
            display: none;
        }
        .expanded .expanded-content {
            display: block;
            margin-top: 1rem;
            margin-left: 3rem;
        }
        .replies-section {
            margin-top: 1rem;
        }
        .reply-item {
            background: var(--input-bg);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border-light);
        }
        .reply-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.3rem;
        }
        .reply-author {
            font-weight: 600;
            color: var(--gold);
            font-size: 0.9rem;
        }
        .reply-admin-badge {
            background: var(--gold);
            color: black;
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: 700;
        }
        .reply-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-left: auto;
        }
        .reply-text {
            font-size: 0.9rem;
            word-break: break-word;
        }
        .reply-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .reply-form input {
            flex: 1;
            min-width: 200px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            color: var(--text-primary);
            outline: none;
        }
        .reply-form input:focus {
            border-color: var(--gold);
        }
        .reply-form button {
            background: var(--gold);
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
        }
        .admin-controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            margin-left: 3rem;
        }
        .resolve-btn {
            background: var(--success);
            color: black;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .empty-feed {
            text-align: center;
            color: var(--text-muted);
            padding: 4rem 1rem;
        }
        .toast-message {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: var(--toast-bg); backdrop-filter: blur(12px); border: 1px solid var(--toast-border);
            border-radius: 60px; padding: 0.9rem 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 1rem; z-index: 10000; opacity: 0; visibility: hidden;
            transition: all 0.4s; color: var(--toast-text);
        }
        .toast-message.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .install-pwa { 
            position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: black; 
            border: none; border-radius: 50px; padding: 0.8rem 1.5rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(202,138,4,0.5); z-index: 3000; display: none; 
        }
        .install-pwa.show { display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body class="dark-theme">
    <!-- exact header from main page -->
    <header class="site-header">
        <div class="header-container">
            <img src="https://i.postimg.cc/T10385m6/20260304-0949-Image-Generation-remix-01kjvspyrkf078efwbh09qxkag-1.webp" alt="I AM MUGERA" class="site-logo">
            <div class="header-desktop-actions">
                <div class="desktop-search">
                    <input type="text" placeholder="Search discussions..." id="desktopSearch" autocomplete="off">
                    <button onclick="searchPosts()"><i class="fas fa-search"></i></button>
                </div>
                <div id="userMenuDesktop" class="user-menu" style="display: none;">
                    <span class="user-name" id="userDisplayNameDesktop"></span>
                    <div class="user-avatar" id="userAvatarDesktop">M</div>
                    <div class="logout-dropdown"><div class="logout-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
                </div>
                <div id="loginButtonDesktop" onclick="openAuthModal()" style="width: auto; padding: 0 1.2rem; border-radius: 40px; gap: 0.5rem; display: flex; background: rgba(202,138,4,0.1); border:1px solid var(--gold); align-items:center; cursor:pointer;">
                    <i class="fas fa-user-circle"></i><span style="font-size:0.9rem;">Account</span>
                </div>
            </div>
            <div class="mobile-header-group">
                <div class="mobile-search-icon" onclick="toggleMobileSearch()"><i class="fas fa-search"></i></div>
                <div class="hamburger-icon" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </header>

    <!-- mobile search overlay -->
    <div class="search-overlay" id="mobileSearchOverlay" style="position:fixed; top:0; left:0; width:100%; background:var(--nav-bg); backdrop-filter:blur(20px); padding:1rem; z-index:2400; transform:translateY(-100%); transition:0.3s; border-bottom:2px solid var(--gold);">
        <div style="display:flex; gap:0.5rem;">
            <input type="text" id="mobileSearchInput" placeholder="Search discussions..." style="flex:1; padding:1rem; background:var(--bg-secondary); border:2px solid var(--gold); border-radius:50px; color:var(--text-primary);">
            <button onclick="searchMobile()" style="background:var(--gold); border:none; width:60px; border-radius:50%; color:black;"><i class="fas fa-search"></i></button>
            <button onclick="toggleMobileSearch()" style="background:transparent; border:none; color:var(--text-muted); font-size:2rem;"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- hamburger panel -->
    <div class="hamburger-panel" id="hamburgerPanel">
        <div class="panel-header"><h3>Menu</h3><button class="close-panel" onclick="toggleHamburger()"><i class="fas fa-times"></i></button></div>
        <div class="panel-user-area" id="panelUserArea">
            <div id="panelLoggedOut" style="display: flex; flex-direction: column; gap: 0.8rem;">
                <div style="text-align: center; color: var(--text-muted);"><i class="fas fa-user-circle" style="font-size: 3rem;"></i></div>
                <button class="panel-logout" onclick="openAuthModal(); toggleHamburger();"><i class="fas fa-sign-in-alt"></i> Login / Sign Up</button>
            </div>
            <div id="panelLoggedIn" style="display: none; flex-direction: column; gap: 0.8rem;">
                <div class="panel-user-info"><div class="panel-avatar" id="panelAvatar">M</div><span class="panel-user-name" id="panelUserName">Mugera</span></div>
                <button class="panel-logout" onclick="handleLogout(); toggleHamburger();"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div class="panel-quick-links">
            <a href="index.html" class="panel-link"><i class="fas fa-home"></i> Home</a>
            <a href="#" class="panel-link" onclick="filterService('all'); toggleHamburger();"><i class="fas fa-globe"></i> All discussions</a>
            <a href="#" class="panel-link" onclick="filterService('eye-of-mugera'); toggleHamburger();"><i class="far fa-newspaper"></i> Eye of Mugera</a>
            <a href="#" class="panel-link" onclick="filterService('inspired-me'); toggleHamburger();"><i class="fas fa-seedling"></i> Inspired.Me</a>
            <a href="#" class="panel-link" onclick="filterService('heritage-shop'); toggleHamburger();"><i class="fas fa-store"></i> Heritage Shop</a>
            <a href="#" class="panel-link" onclick="filterService('workfit'); toggleHamburger();"><i class="fas fa-dumbbell"></i> WorkFit Club</a>
            <a href="#" class="panel-link" onclick="filterService('webdev'); toggleHamburger();"><i class="fas fa-code"></i> Dev Mugera</a>
        </div>
        <div class="panel-theme-toggle">
            <span><i class="fas fa-palette"></i> Dark / Light</span>
            <div onclick="toggleTheme()" style="width:45px; height:45px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; cursor:pointer;">
                <i class="fas fa-moon" id="panelThemeIcon"></i>
            </div>
        </div>
    </div>

    <!-- MAIN SOCIAL FEED -->
    <div class="social-container">
        <!-- compose box -->
        <div class="compose-tweet">
            <div class="compose-header">
                <h2><i class="fas fa-feather-alt"></i> Start a discussion</h2>
            </div>
            <div class="compose-input">
                <textarea id="composeText" placeholder="Ask about a service, share insights..."></textarea>
            </div>
            <div class="post-actions">
                <select id="composeService" class="service-selector">
                    <option value="general">💬 General discussion</option>
                    <option value="eye-of-mugera">👁️ Eye of Mugera</option>
                    <option value="inspired-me">🌱 Inspired.Me</option>
                    <option value="heritage-shop">🛒 African Heritage Shop</option>
                    <option value="workfit">🏋️ WorkFit Club</option>
                    <option value="webdev">💻 MugeraDev</option>
                    <option value="partnership">🤝 Partnership</option>
                </select>
                <button class="post-btn" id="postTrigger" onclick="createPost()"><i class="fas fa-paper-plane"></i> Post</button>
            </div>
            <div id="composeAuthWarning" style="color: var(--danger); margin-top: 0.8rem; display: none;"><i class="fas fa-lock"></i> Please log in to post</div>
        </div>

        <!-- feed -->
        <div class="feed" id="feedContainer">
            <div class="empty-feed">⏳ Loading discussions...</div>
        </div>
    </div>

    <!-- PWA Install -->
    <button class="install-pwa" id="installButton"><i class="fas fa-download"></i> Install App</button>

    <!-- toast -->
    <div id="elegantToast" class="toast-message"><i class="fas fa-globe-africa"></i><span id="toastMessage"></span></div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let currentUser = null;
        let isAdmin = false;
        let allPosts = [];
        let currentFilter = 'all';
        let expandedPostId = null;

        // Auth observer
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('composeAuthWarning').style.display = 'none';
                document.getElementById('postTrigger').disabled = false;
                document.getElementById('userMenuDesktop').style.display = 'flex';
                document.getElementById('loginButtonDesktop').style.display = 'none';
                document.getElementById('panelLoggedOut').style.display = 'none';
                document.getElementById('panelLoggedIn').style.display = 'flex';
                
                let dn = user.displayName || user.email?.split('@')[0] || 'Mugera';
                dn = dn.charAt(0).toUpperCase() + dn.slice(1);
                document.getElementById('userDisplayNameDesktop').textContent = dn;
                document.getElementById('userAvatarDesktop').textContent = dn.charAt(0);
                document.getElementById('panelAvatar').textContent = dn.charAt(0);
                document.getElementById('panelUserName').textContent = dn;

                // admin check
                if (user.email && (user.email.includes('mugera') || user.email === 't@gk.com' || user.email === 'admin@mugera.com')) {
                    isAdmin = true;
                } else {
                    isAdmin = false;
                }
                loadPosts();
            } else {
                document.getElementById('composeAuthWarning').style.display = 'block';
                document.getElementById('postTrigger').disabled = true;
                document.getElementById('userMenuDesktop').style.display = 'none';
                document.getElementById('loginButtonDesktop').style.display = 'flex';
                document.getElementById('panelLoggedOut').style.display = 'flex';
                document.getElementById('panelLoggedIn').style.display = 'none';
                isAdmin = false;
                document.getElementById('feedContainer').innerHTML = '<div class="empty-feed">🔒 Please log in to see discussions</div>';
            }
        });

        // Load posts
        function loadPosts() {
            const postsRef = database.ref('socialPosts').orderByChild('timestamp');
            postsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const posts = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        posts.push({ id: key, ...data[key] });
                    });
                }
                posts.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                allPosts = posts;
                renderFeed();
            });
        }

        // Render feed
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!currentUser) return;

            let filtered = allPosts;
            if (currentFilter !== 'all') {
                filtered = allPosts.filter(p => p.service === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-feed">📭 No discussions yet. Start one!</div>';
                return;
            }

            let html = '';
            filtered.forEach(post => {
                const isExpanded = expandedPostId === post.id;
                const postTime = post.timestamp ? new Date(post.timestamp).toLocaleString('en-KE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
                const authorName = post.authorName || 'Anonymous';
                const authorHandle = post.authorEmail ? '@' + post.authorEmail.split('@')[0] : '@user';
                const serviceDisplay = {
                    'general':'💬 General','eye-of-mugera':'👁️ Eye','inspired-me':'🌱 Inspired',
                    'heritage-shop':'🛒 Shop','workfit':'🏋️ WorkFit','webdev':'💻 Dev','partnership':'🤝 Partner'
                }[post.service] || post.service;

                // Count likes/dislikes
                const likes = post.likes ? Object.keys(post.likes).length : 0;
                const dislikes = post.dislikes ? Object.keys(post.dislikes).length : 0;
                
                // Check if current user liked/disliked
                const userLiked = currentUser && post.likes && post.likes[currentUser.uid];
                const userDisliked = currentUser && post.dislikes && post.dislikes[currentUser.uid];

                // Replies
                let repliesHtml = '';
                if (post.replies) {
                    const replyIds = Object.keys(post.replies).sort((a,b) => post.replies[a].timestamp - post.replies[b].timestamp);
                    replyIds.forEach(rid => {
                        const rep = post.replies[rid];
                        const repTime = rep.timestamp ? new Date(rep.timestamp).toLocaleString('en-KE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
                        repliesHtml += `
                            <div class="reply-item">
                                <div class="reply-header">
                                    <span class="reply-author">${escapeHtml(rep.authorName || 'User')}</span>
                                    ${rep.isAdmin ? '<span class="reply-admin-badge">ADMIN</span>' : ''}
                                    <span class="reply-time">${repTime}</span>
                                    ${ (currentUser?.uid === rep.userId || isAdmin) ? `<span class="delete-btn" onclick="deleteReply('${post.id}','${rid}', event)"><i class="fas fa-trash-alt"></i></span>` : '' }
                                </div>
                                <div class="reply-text">${escapeHtml(rep.text)}</div>
                            </div>
                        `;
                    });
                }

                html += `
                    <div class="post-card ${isExpanded ? 'expanded' : ''}" id="post-${post.id}" onclick="togglePost('${post.id}', event)">
                        <div class="post-header">
                            <div class="post-avatar">${authorName.charAt(0)}</div>
                            <div class="post-author-info">
                                <span class="post-author-name">${escapeHtml(authorName)} ${post.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''} ${post.resolved ? '<span class="resolved-badge"><i class="fas fa-check-circle"></i> Resolved</span>' : ''}</span>
                                <span class="post-author-handle">${escapeHtml(authorHandle)}</span>
                            </div>
                            <span class="post-service-tag">${serviceDisplay}</span>
                        </div>
                        
                        <!-- preview (collapsed) -->
                        <div class="post-preview">${escapeHtml(post.text)}</div>
                        
                        <!-- full content (expanded) -->
                        <div class="post-content-full">${escapeHtml(post.text)}</div>
                        
                        <div class="post-stats" onclick="event.stopPropagation()">
                            <span class="post-stat ${userLiked ? 'liked' : ''}" onclick="handleLike('${post.id}', event)">
                                <i class="fas fa-heart"></i> ${likes}
                            </span>
                            <span class="post-stat ${userDisliked ? 'disliked' : ''}" onclick="handleDislike('${post.id}', event)">
                                <i class="fas fa-thumbs-down"></i> ${dislikes}
                            </span>
                            <span class="post-stat">
                                <i class="fas fa-comment"></i> ${post.replies ? Object.keys(post.replies).length : 0}
                            </span>
                        </div>
                        
                        <!-- expanded content (replies, reply form, admin controls) -->
                        <div class="expanded-content" onclick="event.stopPropagation()">
                            <div class="replies-section" id="replies-${post.id}">
                                ${repliesHtml}
                            </div>
                            
                            <div class="reply-form">
                                <input type="text" id="replyInput-${post.id}" placeholder="Write a reply..." onclick="event.stopPropagation()">
                                <button onclick="postReply('${post.id}', event)"><i class="fas fa-reply"></i> Reply</button>
                            </div>
                            
                            ${isAdmin ? `
                                <div class="admin-controls">
                                    ${!post.resolved ? `
                                        <button class="resolve-btn" onclick="markResolved('${post.id}', event)">
                                            <i class="fas fa-check-circle"></i> Mark resolved
                                        </button>
                                    ` : ''}
                                    <button class="delete-btn" onclick="deletePost('${post.id}', event)">
                                        <i class="fas fa-trash-alt"></i> Delete post
                                    </button>
                                </div>
                            ` : ''}
                            
                            ${currentUser?.uid === post.userId && !isAdmin ? `
                                <div class="admin-controls">
                                    <button class="delete-btn" onclick="deletePost('${post.id}', event)">
                                        <i class="fas fa-trash-alt"></i> Delete my post
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Toggle post expansion
        window.togglePost = function(postId, event) {
            if (event.target.closest('.post-stat') || event.target.closest('.reply-form') || event.target.closest('.admin-controls') || event.target.closest('.delete-btn') || event.target.closest('.resolve-btn')) {
                return;
            }
            expandedPostId = expandedPostId === postId ? null : postId;
            renderFeed();
        };

        // Create post
        window.createPost = async function() {
            if (!currentUser) { showToast('Login required', 'warning'); return; }
            const text = document.getElementById('composeText').value.trim();
            const service = document.getElementById('composeService').value;
            if (!text) { showToast('Write something', 'info'); return; }

            const postData = {
                userId: currentUser.uid,
                authorName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                authorEmail: currentUser.email,
                service: service,
                text: text,
                timestamp: Date.now(),
                isAdmin: isAdmin,
                resolved: false
            };
            try {
                await database.ref('socialPosts').push(postData);
                document.getElementById('composeText').value = '';
                showToast('Posted!', 'success');
            } catch (err) {
                showToast('Error', 'error');
            }
        };

        // Like post
        window.handleLike = async function(postId, event) {
            event.stopPropagation();
            if (!currentUser) { showToast('Login to like', 'warning'); return; }
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const likesRef = database.ref(`socialPosts/${postId}/likes/${currentUser.uid}`);
            const dislikesRef = database.ref(`socialPosts/${postId}/dislikes/${currentUser.uid}`);

            if (post.likes && post.likes[currentUser.uid]) {
                await likesRef.remove();
            } else {
                await likesRef.set(true);
                if (post.dislikes && post.dislikes[currentUser.uid]) {
                    await dislikesRef.remove();
                }
            }
        };

        // Dislike post
        window.handleDislike = async function(postId, event) {
            event.stopPropagation();
            if (!currentUser) { showToast('Login to dislike', 'warning'); return; }
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const dislikesRef = database.ref(`socialPosts/${postId}/dislikes/${currentUser.uid}`);
            const likesRef = database.ref(`socialPosts/${postId}/likes/${currentUser.uid}`);

            if (post.dislikes && post.dislikes[currentUser.uid]) {
                await dislikesRef.remove();
            } else {
                await dislikesRef.set(true);
                if (post.likes && post.likes[currentUser.uid]) {
                    await likesRef.remove();
                }
            }
        };

        // Post reply
        window.postReply = async function(postId, event) {
            event.stopPropagation();
            if (!currentUser) { showToast('Login to reply', 'warning'); return; }
            const input = document.getElementById(`replyInput-${postId}`);
            const text = input.value.trim();
            if (!text) return;

            const replyData = {
                userId: currentUser.uid,
                authorName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                text: text,
                timestamp: Date.now(),
                isAdmin: isAdmin
            };
            try {
                await database.ref(`socialPosts/${postId}/replies`).push(replyData);
                input.value = '';
                showToast('Reply posted', 'success');
            } catch (err) {
                showToast('Reply failed', 'error');
            }
        };

        // Mark as resolved (admin only)
        window.markResolved = async function(postId, event) {
            event.stopPropagation();
            if (!isAdmin) return;
            try {
                await database.ref(`socialPosts/${postId}/resolved`).set(true);
                showToast('Marked as resolved', 'success');
            } catch (err) {
                showToast('Error', 'error');
            }
        };

        // Delete post
        window.deletePost = async function(postId, event) {
            event.stopPropagation();
            if (!currentUser) return;
            if (!confirm('Delete this post?')) return;
            try {
                await database.ref('socialPosts/' + postId).remove();
                showToast('Post deleted', 'success');
            } catch (err) {
                showToast('Error', 'error');
            }
        };

        // Delete reply
        window.deleteReply = async function(postId, replyId, event) {
            event.stopPropagation();
            if (!currentUser) return;
            if (!confirm('Delete this reply?')) return;
            try {
                await database.ref(`socialPosts/${postId}/replies/${replyId}`).remove();
                showToast('Reply deleted', 'success');
            } catch (err) {
                showToast('Error', 'error');
            }
        };

        // Filter by service
        window.filterService = function(service) {
            currentFilter = service;
            expandedPostId = null;
            renderFeed();
        };

        // Search
        window.searchPosts = function() {
            const query = document.getElementById('desktopSearch').value.toLowerCase();
            if (!query) {
                renderFeed();
                return;
            }
            const filtered = allPosts.filter(p => 
                p.text.toLowerCase().includes(query) || 
                (p.service && p.service.toLowerCase().includes(query))
            );
            // Temporarily show filtered results
            const container = document.getElementById('feedContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-feed">🔍 No results found</div>';
            } else {
                // Quick render without changing master filter
                let html = '';
                filtered.forEach(post => {
                    // Simplified render for search results
                    html += `<div class="post-card" onclick="window.location.href='#post-${post.id}'">${escapeHtml(post.text.substring(0,100))}...</div>`;
                });
                container.innerHTML = html;
            }
            showToast('Search completed', 'info');
        };

        window.searchMobile = function() {
            const query = document.getElementById('mobileSearchInput').value;
            document.getElementById('desktopSearch').value = query;
            searchPosts();
            toggleMobileSearch();
        };

        // Utility
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"']/g, function(m) {
                if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;';
                if(m === '"') return '&quot;'; return '&#039;';
            });
        }

        function showToast(text, type='info') {
            const toast = document.getElementById('elegantToast');
            document.getElementById('toastMessage').textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Auth functions
        window.openAuthModal = function() {
            window.location.href = 'index.html?login=1';
        };
        window.handleLogout = async function() {
            await auth.signOut();
            showToast('Logged out', 'success');
        };

        // Toggles
        window.toggleHamburger = () => document.getElementById('hamburgerPanel').classList.toggle('open');
        window.toggleMobileSearch = () => {
            const overlay = document.getElementById('mobileSearchOverlay');
            overlay.style.transform = overlay.style.transform === 'translateY(0px)' ? 'translateY(-100%)' : 'translateY(0px)';
        };
        document.getElementById('hamburgerBtn')?.addEventListener('click', toggleHamburger);

        // Theme
        window.toggleTheme = function() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('panelThemeIcon');
            if (document.body.classList.contains('light-theme')) {
                icon?.classList.replace('fa-moon','fa-sun');
                localStorage.setItem('siteTheme','light');
            } else {
                icon?.classList.replace('fa-sun','fa-moon');
                localStorage.setItem('siteTheme','dark');
            }
        };
        if (localStorage.getItem('siteTheme') === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('panelThemeIcon')?.classList.replace('fa-moon','fa-sun');
        }

        // PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installButton').classList.add('show'); });
        document.getElementById('installButton')?.addEventListener('click', async () => {
            document.getElementById('installButton').classList.remove('show');
            if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
        });
    </script>
</body>
</html>
