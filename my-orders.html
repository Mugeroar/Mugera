<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">            
    <meta name="theme-color" content="#ca8a04">
    <meta name="background-color" content="#0a0a0a">
    <meta name="color-scheme" content="dark light">
    <title>My Orders · I AM MUGERA</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/HLQqRybx/mm.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ca8a04;
            --gold-dark: #a16207;
            --gold-light: #fef3c7;
            --danger: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --teal: #14b8a6;
            --orange: #f97316;
            --indigo: #6366f1;
            
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20,20,20,0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-light: #2a2a2a;
            --shadow-color: rgba(202,138,4,0.25);
            --nav-bg: rgba(10,10,10,0.95);
            --card-bg: #151515;
            --glass-bg: rgba(20,20,20,0.3);
            --glass-border: rgba(255,255,255,0.1);
            --glass-shadow: 0 20px 50px rgba(0,0,0,0.5);
            --toast-bg: rgba(20,20,20,0.95);
            --toast-border: var(--gold);
            --header-height: 70px;
            --input-bg: rgba(255,255,255,0.05);
            --input-focus-bg: rgba(255,255,255,0.1);
            
            /* Order Status Colors */
            --status-pending: #f59e0b;
            --status-confirmed: #3b82f6;
            --status-processing: #8b5cf6;
            --status-out-for-delivery: #8b5cf6;
            --status-delivered: #10b981;
            --status-cancelled: #ef4444;
        }

        body.light-theme {
            --bg-primary: #f8f5f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #2d2d2d;
            --text-muted: #555555;
            --border-light: #dddddd;
            --shadow-color: rgba(202,138,4,0.4);
            --nav-bg: rgba(255,255,255,0.95);
            --card-bg: #ffffff;
            --input-bg: rgba(0,0,0,0.03);
            --input-focus-bg: rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--header-height);
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
        }

        /* Header */
        .site-header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gold); z-index: 2000; padding: 0 1rem;
        }
        .header-container {
            max-width: 1400px; height: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .site-logo {
            height: 48px; border-radius: 12px; border: 2px solid var(--gold);
            padding: 2px; background: var(--bg-primary);
            content: url('https://i.postimg.cc/bwkN851g/20260304_1008_Image_Generation_remix_01kjvtr63ce54v1awen6j4n88x-1.webp');
        }
        .header-desktop-actions { display: flex; align-items: center; gap: 1.5rem; }
        
        .user-menu {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(202,138,4,0.1); border: 1px solid var(--gold);
            border-radius: 40px; padding: 0.3rem 0.3rem 0.3rem 1rem;
            cursor: pointer; position: relative;
        }
        .user-avatar {
            background: var(--gold); color: #000; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
        .logout-dropdown {
            position: absolute; top: 120%; right: 0;
            background: var(--card-bg); border: 1px solid var(--gold);
            border-radius: 20px; padding: 0.5rem;
            min-width: 120px; display: none; z-index: 1001;
        }
        .user-menu:hover .logout-dropdown { display: block; }
        .logout-item {
            padding: 0.7rem 1rem; color: var(--text-primary);
            border-radius: 15px; transition: 0.2s;
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
        }
        .logout-item:hover { background: rgba(202,138,4,0.2); color: var(--gold); }
        
        .mobile-header-group { display: none; align-items: center; gap: 0.8rem; }
        .hamburger-icon {
            border: 1px solid var(--gold); color: var(--gold);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
        }
        .hamburger-icon:hover { background: var(--gold); color: black; }

        /* Hamburger panel */
        .hamburger-panel {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-left: 1px solid var(--gold); padding: 2rem 1.5rem;
            z-index: 2500; transition: right 0.3s ease; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .hamburger-panel.open { right: 0; }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-light); padding-bottom: 1rem;
        }
        .panel-header h3 { font-family: 'Cinzel', serif; color: var(--gold); }
        .close-panel {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 1.8rem; cursor: pointer; line-height: 1;
        }
        .panel-user-area {
            background: rgba(202,138,4,0.05);
            border-radius: 30px;
            padding: 1rem;
            border: 1px solid var(--border-light);
            margin: 1.5rem 0;
        }
        .panel-user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .panel-avatar {
            width: 48px; height: 48px;
            background: var(--gold); color: black;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
        }
        .panel-user-name {
            font-weight: 600;
            color: var(--gold);
        }
        .panel-logout {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            border: 1px solid var(--gold);
            border-radius: 40px;
            color: var(--gold);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .panel-logout:hover {
            background: var(--gold);
            color: black;
        }
        .panel-quick-links {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .panel-link {
            padding: 0.9rem 1rem; background: rgba(255,255,255,0.03);
            border-radius: 30px; color: var(--text-primary); text-decoration: none;
            display: flex; align-items: center; gap: 1rem; transition: 0.2s;
            border: 1px solid transparent;
        }
        .panel-link:hover {
            border-color: var(--gold); background: rgba(202,138,4,0.1); color: var(--gold);
        }
        .panel-link i { width: 24px; color: var(--gold); }
        .panel-theme-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 40px;
            margin-top: auto; border: 1px solid var(--border-light);
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(202,138,4,0.2), rgba(20,20,20,0.95));
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(202,138,4,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .welcome-text {
            position: relative;
            z-index: 1;
        }

        .welcome-text h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .welcome-text p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .welcome-actions {
            display: flex;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .action-icon-btn {
            width: 50px;
            height: 50px;
            background: rgba(202,138,4,0.1);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-icon-btn:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1);
        }

        /* Stats Cards - Interactive */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 30px rgba(202,138,4,0.15);
        }

        .stat-card:hover::before {
            transform: translateX(0);
        }

        .stat-card.active {
            border-color: var(--gold);
            background: rgba(202,138,4,0.05);
        }

        .stat-icon {
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .quick-action-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 40px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .quick-action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(202,138,4,0.05);
        }

        .quick-action-btn i {
            color: var(--gold);
        }

        /* Search and Filter Bar */
        .search-filter-bar {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 60px;
            padding: 0.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .search-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            min-width: 250px;
        }

        .search-wrapper i {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 0.5rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .search-wrapper button {
            background: var(--gold);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: black;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-wrapper button:hover {
            background: var(--gold-dark);
            transform: scale(1.05);
        }

        .filter-select {
            padding: 0.8rem 2rem 0.8rem 1.5rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 40px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ca8a04'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .refresh-btn {
            width: 45px;
            height: 45px;
            background: rgba(202,138,4,0.1);
            border: 1px solid var(--gold);
            border-radius: 50%;
            color: var(--gold);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: var(--gold);
            color: black;
            transform: rotate(180deg);
        }

        /* Orders Grid - Card Layout */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .order-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .order-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--gold), var(--gold-dark));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .order-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 30px rgba(202,138,4,0.15);
        }

        .order-card:hover::before {
            opacity: 1;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(202,138,4,0.2);
        }

        .order-id {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: var(--gold);
            font-size: 1rem;
        }

        .order-status {
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: rgba(245,158,11,0.15);
            color: var(--warning);
            border: 1px solid rgba(245,158,11,0.3);
        }

        .status-confirmed {
            background: rgba(59,130,246,0.15);
            color: var(--info);
            border: 1px solid rgba(59,130,246,0.3);
        }

        .status-processing {
            background: rgba(139,92,246,0.15);
            color: var(--purple);
            border: 1px solid rgba(139,92,246,0.3);
        }

        .status-out-for-delivery {
            background: rgba(139,92,246,0.15);
            color: var(--purple);
            border: 1px solid rgba(139,92,246,0.3);
        }

        .status-delivered {
            background: rgba(16,185,129,0.15);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.3);
        }

        .status-cancelled {
            background: rgba(220,38,38,0.15);
            color: var(--danger);
            border: 1px solid rgba(220,38,38,0.3);
        }

        .order-items-preview {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .item-icon {
            width: 40px;
            height: 40px;
            background: rgba(202,138,4,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
        }

        .item-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .item-count span {
            color: var(--gold);
            font-weight: 600;
        }

        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px dashed rgba(202,138,4,0.2);
            border-bottom: 1px dashed rgba(202,138,4,0.2);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .detail-item i {
            color: var(--gold);
            width: 16px;
            font-size: 0.9rem;
        }

        .detail-item strong {
            color: var(--text-secondary);
            margin-left: 0.3rem;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .order-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .card-action-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(202,138,4,0.2);
            border-radius: 50%;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-action-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(202,138,4,0.05);
            transform: scale(1.1);
        }

        .card-action-btn.cancel:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .card-action-btn.track:hover {
            border-color: var(--success);
            color: var(--success);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255,255,255,0.02);
            border-radius: 40px;
            border: 2px dashed rgba(202,138,4,0.3);
            margin: 2rem 0;
        }

        .empty-state-icon {
            font-size: 5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state h3 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 2rem;
            font-size: 1.1rem;
        }

        .shop-now-btn {
            padding: 1rem 3rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 10px 20px rgba(202,138,4,0.3);
        }

        .shop-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(202,138,4,0.4);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 9499;
            display: none;
        }
        .modal-overlay.active { display: block; }
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 30px;
            border: 2px solid var(--gold);

        }
        .modal.active { display: block; animation: modalPop 0.3s ease; }
        @keyframes modalPop {
            from { opacity: 0; transform: translate(-50%,-55%); }

        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        .modal-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
        }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: var(--gold);
            transform: rotate(90deg);
        }
        .modal-body {
            margin-bottom: 1.5rem;
        }
        .modal-field {
            margin-bottom: 1.2rem;
        }
        .modal-field label {
            display: block;
            color: var(--gold);
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .modal-field .field-value {
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border-radius: 12px;
            color: var(--text-primary);
            word-break: break-word;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .modal-field .field-value:hover {
            border-color: rgba(202,138,4,0.3);
        }
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        /* Loading and Toast */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-content {
            text-align: center;
        }
        .loading-spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(202,138,4,0.2);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-content p {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 10001;
        }
        .toast {
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--gold);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 300px;
            animation: slideInRight 0.3s ease;
            border: 1px solid rgba(202,138,4,0.3);
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--info); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .header-desktop-actions { display: none; }
            .mobile-header-group { display: flex; }
            .main-content { padding: 1rem; }
            .welcome-banner { flex-direction: column; text-align: center; }
            .search-filter-bar { flex-direction: column; border-radius: 30px; }
            .search-wrapper { width: 100%; }
            .filter-select { width: 100%; }
            .orders-grid { grid-template-columns: 1fr; }
            .quick-actions { justify-content: center; }
        }
    </style>
</head>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Global state
        let currentUser = null;
        let userData = {};
        let orders = [];
        let filteredOrders = [];
        let currentFilter = 'all';

        // ========== AUTH STATE LISTENER ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                showLoading(true);
                
                try {
                    await loadUserData();
                    await loadUserOrders();
                    renderPage();
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error loading orders', 'error');
                    renderLoginPage();
                } finally {
                    showLoading(false);
                }
            } else {
                renderLoginPage();
            }
        });

        // ========== LOAD USER DATA ==========
        async function loadUserData() {
            const userSnapshot = await database.ref(`users/${currentUser.uid}`).once('value');
            if (userSnapshot.exists()) {
                userData = userSnapshot.val();
            } else {
                userData = {
                    name: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
                    email: currentUser.email,
                    uid: currentUser.uid
                };
            }
            
            updateUserUI();
        }

        function updateUserUI() {
            const displayName = userData.name || currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
            document.getElementById('userDisplayNameDesktop').textContent = displayName;
            document.getElementById('panelUserName').textContent = displayName;
            
            const initial = displayName.charAt(0).toUpperCase();
            document.getElementById('userAvatarDesktop').textContent = initial;
            document.getElementById('panelAvatar').textContent = initial;
            
            document.getElementById('userMenuDesktop').style.display = 'flex';
            document.getElementById('loginButtonDesktop').style.display = 'none';
            document.getElementById('panelLoggedOut').style.display = 'none';
            document.getElementById('panelLoggedIn').style.display = 'flex';
        }

        // ========== LOAD USER ORDERS ==========
        async function loadUserOrders() {
            try {
                const snapshot = await database.ref('orders')
                    .orderByChild('userId')
                    .equalTo(currentUser.uid)
                    .once('value');
                
                const data = snapshot.val() || {};
                
                orders = Object.entries(data).map(([id, order]) => {
                    // Calculate item count
                    const itemCount = order.items ? 
                        order.items.reduce((sum, item) => sum + (item.quantity || 1), 0) : 1;
                    
                    // Parse date
                    let timestamp = order.orderDate ? new Date(order.orderDate).getTime() : 
                                   order.timestamp ? order.timestamp : Date.now();
                    
                    // Get first item for preview
                    const firstItem = order.items && order.items.length > 0 ? order.items[0] : null;
                    
                    return {
                        id: id,
                        orderId: id.slice(-8).toUpperCase(),
                        fullId: id,
                        date: order.orderDate || order.timestamp || null,
                        displayDate: order.orderDate ? new Date(order.orderDate).toLocaleDateString() : 
                                    order.timestamp ? new Date(order.timestamp).toLocaleDateString() : 'N/A',
                        items: order.items || [],
                        itemCount: itemCount,
                        firstItem: firstItem,
                        subtotal: order.subtotal || 0,
                        deliveryFee: order.deliveryFee || 150,
                        total: order.total || order.totalAmount || 0,
                        status: order.status || 'pending',
                        paymentMethod: order.paymentMethod || 'M-Pesa',
                        deliveryAddress: order.deliveryAddress || order.address || 'Not specified',
                        deliveryDate: order.deliveryDate || null,
                        assignedTo: order.assignedTo || null,
                        assignedName: order.assignedName || null,
                        timestamp: timestamp
                    };
                });

                // Sort by date (newest first)
                orders.sort((a, b) => b.timestamp - a.timestamp);
                filteredOrders = [...orders];
                
                console.log(`Loaded ${orders.length} orders for user`);
                
            } catch (error) {
                console.error('Error loading orders:', error);
                orders = [];
                filteredOrders = [];
            }
        }

        // ========== RENDER FUNCTIONS ==========
        function renderLoginPage() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <h3>Welcome to My Orders</h3>
                    <p>Please login to view your order history and track your purchases.</p>
                    <button class="shop-now-btn" onclick="openAuthModal()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </div>
            `;
            
            document.getElementById('userMenuDesktop').style.display = 'none';
            document.getElementById('loginButtonDesktop').style.display = 'flex';
            document.getElementById('panelLoggedOut').style.display = 'flex';
            document.getElementById('panelLoggedIn').style.display = 'none';
        }

        function renderPage() {
            if (!currentUser) {
                renderLoginPage();
                return;
            }
            
            if (orders.length === 0) {
                renderEmptyOrders();
                return;
            }
            
            renderOrdersPage();
        }

        function renderEmptyOrders() {
            const displayName = userData.name || currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
            
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- Welcome Banner -->
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Welcome back, ${displayName}! 👋</h1>
                        <p>Ready to start shopping? Discover our premium collection.</p>
                    </div>
                    <div class="welcome-actions">
                        <div class="action-icon-btn" onclick="goToShop()" title="Shop Now">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="action-icon-btn" onclick="refreshOrders()" title="Refresh">
                            <i class="fas fa-sync-alt"></i>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <i class="fas fa-box-open"></i>
                    </div>
                    <h3>No Orders Yet</h3>
                    <p>You haven't placed any orders yet. Start shopping to see your orders here!</p>
                    <button class="shop-now-btn" onclick="goToShop()">
                        <i class="fas fa-store"></i> Start Shopping
                    </button>
                </div>
            `;
        }

        function renderOrdersPage() {
            const stats = getOrderStats();
            const displayName = userData.name || currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
            
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <!-- Welcome Banner -->
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Welcome back, ${displayName}! 👋</h1>
                        <p>You have ${stats.total} order${stats.total !== 1 ? 's' : ''} • ${stats.delivered} delivered</p>
                    </div>
                    <div class="welcome-actions">
                        <div class="action-icon-btn" onclick="goToShop()" title="Shop Now">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="action-icon-btn" onclick="refreshOrders()" title="Refresh">
                            <i class="fas fa-sync-alt"></i>
                        </div>
                    </div>
                </div>

                <!-- Interactive Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card ${currentFilter === 'all' ? 'active' : ''}" onclick="filterByStatus('all')">
                        <div class="stat-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-value">${stats.total}</div>
                        <div class="stat-label">All Orders</div>
                    </div>
                    <div class="stat-card ${currentFilter === 'pending' ? 'active' : ''}" onclick="filterByStatus('pending')">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-value">${stats.pending}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card ${currentFilter === 'processing' ? 'active' : ''}" onclick="filterByStatus('processing')">
                        <div class="stat-icon">
                            <i class="fas fa-cog"></i>
                        </div>
                        <div class="stat-value">${stats.processing}</div>
                        <div class="stat-label">Processing</div>
                    </div>
                    <div class="stat-card ${currentFilter === 'delivered' ? 'active' : ''}" onclick="filterByStatus('delivered')">
                        <div class="stat-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-value">${stats.delivered}</div>
                        <div class="stat-label">Delivered</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="filterByStatus('all')">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="quick-action-btn" onclick="filterByStatus('pending')">
                        <i class="fas fa-clock"></i> Pending
                    </button>
                    <button class="quick-action-btn" onclick="filterByStatus('processing')">
                        <i class="fas fa-cog"></i> Processing
                    </button>
                    <button class="quick-action-btn" onclick="filterByStatus('delivered')">
                        <i class="fas fa-check-circle"></i> Delivered
                    </button>
                    <button class="quick-action-btn" onclick="sortOrders('date')">
                        <i class="fas fa-sort-amount-down"></i> Newest
                    </button>
                </div>

                <!-- Search and Filter Bar -->
                <div class="search-filter-bar">
                    <div class="search-wrapper">
                        <i class="fas fa-search" style="margin-left: 0.5rem;"></i>
                        <input type="text" id="searchInput" placeholder="Search by order ID...">
                        <button onclick="filterOrders()"><i class="fas fa-arrow-right"></i></button>
                    </div>
                    <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="processing">Processing</option>
                        <option value="out-for-delivery">Out for Delivery</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <button class="refresh-btn" onclick="refreshOrders()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <!-- Orders Grid -->
                <div class="orders-grid" id="ordersGrid">
                    ${renderOrderCards()}
                </div>
            `;

            // Add event listeners
            document.getElementById('searchInput').addEventListener('input', filterOrders);
        }

        function renderOrderCards() {
            if (filteredOrders.length === 0) {
                return `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <i class="fas fa-search" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                        <p style="color: var(--text-muted);">No orders match your filters</p>
                    </div>
                `;
            }

            let html = '';
            filteredOrders.forEach(order => {
                const statusClass = `status-${order.status}`;
                const firstItemName = order.firstItem ? order.firstItem.name : 'Product';
                
                html += `
                    <div class="order-card" onclick="viewOrderDetails('${order.id}')">
                        <div class="order-header">
                            <span class="order-id">#${order.orderId}</span>
                            <span class="order-status ${statusClass}">${order.status}</span>
                        </div>
                        
                        <div class="order-items-preview">
                            <div class="item-icon">
                                <i class="fas fa-box"></i>
                            </div>
                            <div class="item-count">
                                <span>${order.itemCount}</span> item${order.itemCount !== 1 ? 's' : ''}
                            </div>
                        </div>

                        <div class="order-details">
                            <div class="detail-item">
                                <i class="fas fa-calendar"></i>
                                <span>${order.displayDate}</span>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-credit-card"></i>
                                <span>${order.paymentMethod}</span>
                            </div>
                        </div>

                        <div class="order-footer">
                            <span class="order-total">KSh ${order.total.toLocaleString()}</span>
                            <div class="card-actions" onclick="event.stopPropagation()">
                                <button class="card-action-btn" onclick="viewOrderDetails('${order.id}')" title="View Details">
                                    <i class="fas fa-eye"></i>
                                </button>
                                ${order.status === 'pending' ? `
                                    <button class="card-action-btn cancel" onclick="cancelOrder('${order.id}')" title="Cancel Order">
                                        <i class="fas fa-times"></i>
                                    </button>
                                ` : ''}
                                ${order.status === 'out-for-delivery' ? `
                                    <button class="card-action-btn track" onclick="trackOrder('${order.id}')" title="Track Order">
                                        <i class="fas fa-map-marker-alt"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            return html;
        }

        function getOrderStats() {
            const total = orders.length;
            const pending = orders.filter(o => o.status === 'pending').length;
            const processing = orders.filter(o => 
                o.status === 'confirmed' || o.status === 'processing' || o.status === 'out-for-delivery'
            ).length;
            const delivered = orders.filter(o => o.status === 'delivered').length;
            const totalSpent = orders
                .filter(o => o.status !== 'cancelled')
                .reduce((sum, o) => sum + (o.total || 0), 0);
            
            return { total, pending, processing, delivered, totalSpent };
        }

        // ========== FILTER FUNCTIONS ==========
        function filterOrders() {
            const searchInput = document.getElementById('searchInput');
            const statusFilter = document.getElementById('statusFilter');
            
            if (!searchInput || !statusFilter) return;
            
            const searchTerm = searchInput.value.toLowerCase();
            const statusValue = statusFilter.value;

            filteredOrders = orders.filter(order => {
                const matchesSearch = order.orderId.toLowerCase().includes(searchTerm) || 
                                      order.fullId.toLowerCase().includes(searchTerm);
                const matchesStatus = statusValue === 'all' || order.status === statusValue;
                return matchesSearch && matchesStatus;
            });

            const grid = document.getElementById('ordersGrid');
            if (grid) {
                grid.innerHTML = renderOrderCards();
            }
        }

        function filterByStatus(status) {
            currentFilter = status;
            const statusFilter = document.getElementById('statusFilter');
            if (statusFilter) {
                statusFilter.value = status;
            }
            filterOrders();
            
            // Update active state on stats cards
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }

        function sortOrders(type) {
            if (type === 'date') {
                filteredOrders.sort((a, b) => b.timestamp - a.timestamp);
            }
            const grid = document.getElementById('ordersGrid');
            if (grid) {
                grid.innerHTML = renderOrderCards();
            }
            showToast('Orders sorted by date', 'success');
        }

        // ========== ORDER ACTIONS ==========
        window.viewOrderDetails = function(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            // Generate items HTML
            let itemsHtml = '';
            if (order.items && order.items.length > 0) {
                itemsHtml = '<div style="margin-bottom: 0.5rem;">';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div style="display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px dashed var(--border-light);">
                            <div>
                                <strong>${item.name || 'Product'}</strong>
                                <div style="font-size: 0.8rem; color: var(--text-muted);">Qty: ${item.quantity || 1}</div>
                            </div>
                            <span style="color: var(--gold);">KSh ${((item.price || 0) * (item.quantity || 1)).toLocaleString()}</span>
                        </div>
                    `;
                });
                itemsHtml += '</div>';
            }

            const deliveryDate = order.deliveryDate ? new Date(order.deliveryDate).toLocaleDateString() : 'Not scheduled';
            const statusClass = `status-${order.status}`;
            
            const content = `
                <div class="modal-field">
                    <label>Order ID</label>
                    <div class="field-value">#${order.fullId}</div>
                </div>
                <div class="modal-field">
                    <label>Order Date</label>
                    <div class="field-value">${order.date ? new Date(order.date).toLocaleString() : 'N/A'}</div>
                </div>
                <div class="modal-field">
                    <label>Items</label>
                    <div class="field-value">${itemsHtml}</div>
                </div>
                <div class="modal-field">
                    <label>Payment Method</label>
                    <div class="field-value">${order.paymentMethod || 'N/A'}</div>
                </div>
                <div class="modal-field">
                    <label>Delivery Address</label>
                    <div class="field-value">${order.deliveryAddress}</div>
                </div>
                <div class="modal-field">
                    <label>Delivery Date</label>
                    <div class="field-value">${deliveryDate}</div>
                </div>
                <div class="modal-field">
                    <label>Delivery Assistant</label>
                    <div class="field-value">${order.assignedName || 'Not assigned yet'}</div>
                </div>
                <div style="background: rgba(202,138,4,0.05); padding: 1rem; border-radius: 12px; margin: 1rem 0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Subtotal:</span>
                        <span>KSh ${(order.subtotal || 0).toLocaleString()}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Delivery:</span>
                        <span>KSh ${(order.deliveryFee || 150).toLocaleString()}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: 700; color: var(--gold); margin-top: 0.5rem; padding-top: 0.5rem; border-top: 2px solid rgba(202,138,4,0.3);">
                        <span>Total:</span>
                        <span>KSh ${(order.total || 0).toLocaleString()}</span>
                    </div>
                </div>
                <div class="modal-field">
                    <label>Status</label>
                    <div class="field-value">
                        <span class="order-status ${statusClass}" style="display: inline-block;">${order.status}</span>
                    </div>
                </div>
            `;

            document.getElementById('modalTitle').textContent = 'Order Details';
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('detailsModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        };

        window.cancelOrder = async function(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;
            
            showLoading(true);
            
            try {
                await database.ref(`orders/${orderId}`).update({
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString()
                });
                
                showToast('Order cancelled successfully', 'success');
                await loadUserOrders();
                renderOrdersPage();
                
            } catch (error) {
                console.error('Error cancelling order:', error);
                showToast('Failed to cancel order', 'error');
            } finally {
                showLoading(false);
            }
        };

        window.trackOrder = function(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order || !order.deliveryAddress) return;
            
            const encodedAddress = encodeURIComponent(order.deliveryAddress);
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodedAddress}`, '_blank');
        };

        window.refreshOrders = function() {
            showLoading(true);
            loadUserOrders().then(() => {
                renderOrdersPage();
                showToast('Orders refreshed', 'success');
                showLoading(false);
            }).catch(() => showLoading(false));
        };

        window.goToShop = function() {
            window.location.href = 'shop.html';
        };

        // ========== AUTH FUNCTIONS ==========
        window.openAuthModal = function() {
            document.getElementById('authModal').classList.add('active');
            document.getElementById('authModalOverlay').classList.add('active');
        };

        window.closeAuthModal = function() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('authModalOverlay').classList.remove('active');
            document.getElementById('loginError').style.display = 'none';
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (!email || !password) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Please enter email and password';
                return;
            }
            
            showLoading(true);
            
            try {
                errorEl.style.display = 'none';
                await auth.signInWithEmailAndPassword(email, password);
                closeAuthModal();
            } catch (error) {
                errorEl.style.display = 'block';
                errorEl.textContent = error.message;
                showLoading(false);
            }
        };

        window.handleLogout = async () => {
            try {
                showLoading(true);
                await auth.signOut();
                window.location.reload();
            } catch (error) {
                showToast('Logout failed', 'error');
                showLoading(false);
            }
        };

        window.closeModal = function() {
            document.getElementById('detailsModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        };

        // ========== UTILITY FUNCTIONS ==========
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.toggle('active', show);
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = { 
                success: 'check-circle', 
                error: 'exclamation-circle', 
                warning: 'exclamation-triangle', 
                info: 'info-circle' 
            };
            toast.innerHTML = `<i class="fas fa-${icons[type]}"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== TOGGLE HAMBURGER ==========
        window.toggleHamburger = function() {
            document.getElementById('hamburgerPanel').classList.toggle('open');
        };

        document.getElementById('hamburgerBtn')?.addEventListener('click', toggleHamburger);

        document.addEventListener('click', function(e) {
            const panel = document.getElementById('hamburgerPanel');
            const btn = document.getElementById('hamburgerBtn');
            if (panel && panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('open');
            }
        });

        // ========== THEME TOGGLE ==========
        window.toggleTheme = function() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('panelThemeIcon');
            if (icon) {
                icon.classList.toggle('fa-moon', !document.body.classList.contains('light-theme'));
                icon.classList.toggle('fa-sun', document.body.classList.contains('light-theme'));
            }
            localStorage.setItem('siteTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        };

        if (localStorage.getItem('siteTheme') === 'light') {
            document.body.classList.add('light-theme');
            const icon = document.getElementById('panelThemeIcon');
            if (icon) icon.classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
